name: On Host Tests
description: Runs on-host tests.
inputs:
  nightly:
    description: "Indicates if this is a nightly job."
    required: true
  test_artifacts_key:
    description: "Artifact key used to store test artifacts."
    required: true
  test_results_key:
    description: "Artifact key used to store test results."
    required: true
  num_gtest_shards:
    description: "Total number of shards used to run the steps in this file."
    required: true
  test_executables_json:
    description: "JSON array of test executables to run."
    required: true
  test_type:
    description: "The test type (gtest or junit)."
    required: false
    default: "gtest"
runs:
  using: "composite"
  steps:
    - name: Set Up Depot Tools
      uses: ./.github/actions/depot_tools
      with:
        run_sync: 'false'
    - name: Download Artifacts
      uses: actions/download-artifact@v5
      with:
        name: ${{ inputs.test_artifacts_key }}
    - name: Checkout JUnit Dependencies
      if: ${{ inputs.test_type == 'junit' }}
      shell: bash
      run: |
        git sparse-checkout add testing build third_party/catapult third_party/logdog third_party/jdk
    - name: Extract Artifacts
      shell: bash
      run: |
        set -x
        mkdir -p unit_test/out/
        cd unit_test/out/
        for f in ../../*.tar.*; do
          if [ -f "$f" ]; then
            if [[ "$f" == *.zstd || "$f" == *.zst ]]; then
              tar -I 'zstd -T0' -xf "$f"
            else
              tar -xf "$f"
            fi
          fi
        done
        if [ "${{ inputs.test_type }}" == "junit" ]; then
          # Go to workspace root (/github/workspace)
          cd ../..

          # Symlink all extracted third_party subdirectories into the git-checked-out third_party directory
          for d in unit_test/out/third_party/*; do
            if [ "$(basename "$d")" != "jdk" ]; then
              ln -sf "../$d" "third_party/$(basename "$d")"
            fi
          done

          # Symlink the prebuilt Java 23 checked out in sparse checkout to unit_test/out/third_party/jdk/current
          mkdir -p unit_test/out/third_party/jdk
          ln -sf "${GITHUB_WORKSPACE}/third_party/jdk/current" unit_test/out/third_party/jdk/current
        fi
    - name: Prepare Test Execution
      id: prepare-test-execution
      shell: bash
      run: |
        set -x
        env

        out_dir="${GITHUB_WORKSPACE}/unit_test/out/${{ matrix.platform }}_${{ matrix.config }}"
        # TODO: LD_LIBRARY_PATH should not include the starboard subdirectory.
        LD_LIBRARY_PATH="${out_dir}/starboard:${out_dir}"
        echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" >> $GITHUB_ENV

        # TODO: b/467135717 - Remove this once tests don't have asan leaks.
        # Don't fail if only asan fails.
        echo "ASAN_OPTIONS=exitcode=0" >> $GITHUB_ENV

        # Make results dir available to the archiving step below.
        results_dir="${GITHUB_WORKSPACE}/results"
        echo "results_dir=${results_dir}" >> $GITHUB_ENV

        # Test results (xml and logs) must be in a subfolder in results_dir
        # to be picked up by the test result processor.
        # This also prevents accidental overwriting when collecting results.
        test_output="${results_dir}/shard_${{ matrix.shard }}"
        mkdir -p ${test_output}
        echo "test_output=${test_output}" >> $GITHUB_ENV

        # Prevent git commands from traversing up to workspace root
        echo "GIT_CEILING_DIRECTORIES=${GITHUB_WORKSPACE}/unit_test" >> $GITHUB_ENV
    - name: Run GTest Suites
      if: ${{ inputs.test_type == 'gtest' }}
      id: run-gtest-suites
      shell: bash
      env:
        XVFB_SERVER_ARGS: "-screen 0 1920x1080x24i +render +extension GLX -noreset"
        GTEST_SHARD_INDEX: ${{ matrix.shard }}
        GTEST_TOTAL_SHARDS: ${{ inputs.num_gtest_shards }}
        TEST_EXECUTABLES_JSON: ${{ inputs.test_executables_json }}
      run: |
        set -x
        cd unit_test/out/

        failed_suites=""

        # Parse the JSON array into a space-separated string using jq.
        test_executables=$(jq -nr --arg json "${TEST_EXECUTABLES_JSON:-[]}" '$json | fromjson | join(" ")')

        for test_executable_path in ${test_executables}; do
          filename=$(basename "${test_executable_path}")
          test_executable="${filename%%.*}"

          echo "Running tests for suite: ${test_executable}"

          xml_path="${test_output}/${test_executable}_result.xml"
          log_path="${test_output}/${test_executable}_log.txt"

          # Check if a wrapper script was generated for the test (e.g. by test_runner_script).
          # If so, use it as the entrypoint to run tests.
          wrapper_path="$(dirname "${test_executable_path}")/bin/run_${test_executable}"
          if [[ -x "${wrapper_path}" ]]; then
            ENTRYPOINT="./${wrapper_path}"
          else
            ENTRYPOINT="./${test_executable_path}"
          fi

          # GTest execution path
          test_filter="*"
          test_filter_json_dir="${GITHUB_WORKSPACE}/cobalt/testing/filters/${{ matrix.platform }}/${test_executable}_filter.json"
          if [ -f ${test_filter_json_dir} ]; then
            test_filter=`jq -r '"-" + (.failing_tests | join(":"))' ${test_filter_json_dir}`
          fi

          echo "Test filter evaluated to: ${test_filter}"

          if [ "${test_filter}" == "-*" ]; then
            echo "Skipped due to test filter." > ${log_path}
          else
            /usr/bin/xvfb-run -a --server-args="${XVFB_SERVER_ARGS}" \
                stdbuf -i0 -o0 -e0 $ENTRYPOINT \
                --single-process-tests \
                --gtest_shard_index="${GTEST_SHARD_INDEX}" \
                --gtest_total_shards="${GTEST_TOTAL_SHARDS}" \
                --gtest_output="xml:${xml_path}" \
                --gtest_filter="${test_filter}" 2>&1 | tee ${log_path} || {
              failed_suites="${failed_suites} ${test_executable}"
            }

            if [[ ! -f ${xml_path} ]]; then
              python3 ${GITHUB_WORKSPACE}/.github/scripts/generate_crash_report.py "${log_path}" "${xml_path}"
            fi
          fi
        done

        echo "Finished running GTest tests..."
        if [[ -n "${failed_suites}" ]]; then
          echo "Test suites failed:${failed_suites}"
          # Fail the job so it's easy to retrigger.
          exit 1
        fi
    - name: Run JUnit Suites
      if: ${{ inputs.test_type == 'junit' }}
      id: run-junit-suites
      shell: bash
      env:
        TEST_EXECUTABLES_JSON: ${{ inputs.test_executables_json }}
      run: |
        set -x
        cd unit_test/out/

        # Dynamically create the out/<config> -> .. redirect symlink
        build_config_dir=$(jq -r '.[] | select(.test_type == "junit") | .executable' test_targets.json | head -n1 | cut -d'/' -f2)
        mkdir -p out
        ln -sf .. "out/${build_config_dir}"

        failed_suites=""

        # Parse the JSON array into a space-separated string using jq.
        test_executables=$(jq -nr --arg json "${TEST_EXECUTABLES_JSON:-[]}" '$json | fromjson | join(" ")')

        for test_executable_path in ${test_executables}; do
          filename=$(basename "${test_executable_path}")
          test_executable="${filename%%.*}"

          echo "Running tests for suite: ${test_executable}"

          xml_path="${test_output}/${test_executable}_result.xml"
          log_path="${test_output}/${test_executable}_log.txt"

          # Check if a wrapper script was generated for the test (e.g. by test_runner_script).
          # If so, use it as the entrypoint to run tests.
          wrapper_path="$(dirname "${test_executable_path}")/bin/run_${test_executable}"
          if [[ -x "${wrapper_path}" ]]; then
            ENTRYPOINT="./${wrapper_path}"
          else
            ENTRYPOINT="./${test_executable_path}"
          fi

          # Run JUnit tests and generate JSON report, then convert to XML.
          json_path="${test_output}/${test_executable}_result.json"
          stdbuf -i0 -o0 -e0 $ENTRYPOINT --json-results-file="${json_path}" 2>&1 | tee ${log_path} || {
            failed_suites="${failed_suites} ${test_executable}"
          }
          if [[ -f ${json_path} ]]; then
            python3 ${GITHUB_WORKSPACE}/.github/scripts/convert_json_to_junit_xml.py "${json_path}" "${xml_path}"
          else
            python3 ${GITHUB_WORKSPACE}/.github/scripts/generate_crash_report.py "${log_path}" "${xml_path}"
          fi
        done

        echo "Finished running JUnit tests..."
        if [[ -n "${failed_suites}" ]]; then
          echo "Test suites failed:${failed_suites}"
          # Fail the job so it's easy to retrigger.
          exit 1
        fi
    - name: Archive Test Results
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test_results_key }}
        path: ${{ env.results_dir }}/*
