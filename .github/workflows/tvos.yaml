name: tvos

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches:
      - main
      - experimental/*
      - feature/*
  push:
    branches:
      - main
      - experimental/*
      - feature/*
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Nightly workflow.'
        required: true
        type: boolean
        default: false

permissions: read-all

jobs:
  get-sha:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.set-sha.outputs.sha }}
    steps:
      - id: set-sha
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${PUSH_SHA}" >> "$GITHUB_OUTPUT"
          fi

  wait-for-kokoro-build:
    needs: get-sha
    runs-on: ubuntu-latest
    timeout-minutes: 150 # 2.5 hours timeout to ensure we don't block forever but allow 2h polling
    outputs:
      invocation_id: ${{ steps.poll-status.outputs.invocation_id }}
    steps:
      - name: Poll GitHub Statuses API for Kokoro build
        id: poll-status
        env:
          COMMIT_SHA: ${{ needs.get-sha.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Polling GitHub Statuses API for Kokoro status on commit ${COMMIT_SHA}..."
          for i in {1..240}; do # Poll for 2 hours (240 * 30s)
            echo "Attempt ${i}/240..."
            statuses=$(gh api "repos/youtube/cobalt/commits/${COMMIT_SHA}/statuses")

            echo "--- Current Statuses ---"
            echo "${statuses}" | jq -r '.[] | "\(.context): \(.state) (\(.description))"'
            echo "----------------------"

            # Select the latest kokoro status
            target_status=$(echo "${statuses}" | jq -c '[.[] | select(.context == "kokoro")][0]')

            if [[ -n "${target_status}" && "${target_status}" != "null" ]]; then
              state=$(echo "${target_status}" | jq -r '.state')
              description=$(echo "${target_status}" | jq -r '.description')
              target_url=$(echo "${target_status}" | jq -r '.target_url')
              invocation_id="${target_url##*/}"

              echo "Found target status: kokoro"
              echo "State: ${state} | Description: ${description}"
              echo "Kokoro Invocation ID: ${invocation_id}"
              echo "Kokoro ResultStore URL: ${target_url}"

              if [[ "${state}" == "success" ]]; then
                echo "Kokoro build succeeded!"
                echo "invocation_id=${invocation_id}" >> "$GITHUB_OUTPUT"
                exit 0
              elif [[ "${state}" == "failure" || "${state}" == "error" ]]; then
                echo "Kokoro build failed with state: ${state}"
                exit 1
              fi
              # If state is "pending", we continue waiting
            else
              echo "Kokoro status not found yet."
            fi

            echo "Waiting 30 seconds..."
            sleep 30
          done
          echo "Timeout waiting for Kokoro build."
          exit 1

  get-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            cobalt/build/testing/targets/tvos-arm64-simulator/test_targets.json
          sparse-checkout-cone-mode: false

      - name: Extract Targets
        id: set-targets
        run: |
          json_file="cobalt/build/testing/targets/tvos-arm64-simulator/test_targets.json"
          if [[ ! -f "${json_file}" ]]; then
            echo "ERROR: ${json_file} not found!"
            exit 1
          fi
          targets=$(jq -cr '[.[] | select(.target != null) | .target | split(":")[-1]]' "${json_file}")
          echo "Targets found: ${targets}"
          echo "targets=${targets}" >> "$GITHUB_OUTPUT"

  download-artifacts:
    needs: [get-sha, wait-for-kokoro-build, get-targets]
    runs-on: [self-hosted, chrobalt-linux-runner]
    steps:
      - name: Set Up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Artifacts from GCS
        env:
          INVOCATION_ID: ${{ needs.wait-for-kokoro-build.outputs.invocation_id }}
          TARGETS: ${{ needs.get-targets.outputs.targets }}
        run: |
          BUCKET="cobalt-unittest-storage"
          PLATFORM="tvos-arm64-simulator"
          CONFIG="devel"
          for target in $(python3 -c "import json, os; print(' '.join(json.loads(os.environ['TARGETS'])))"); do
            echo "Downloading ${target}.tar.gz..."
            gcloud storage cp "gs://${BUCKET}/kokoro/build/${PLATFORM}_${CONFIG}/${INVOCATION_ID}/${target}.tar.gz" .
          done

      - name: Upload to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: tvos-test-artifacts
          path: "*.tar.gz"
          retention-days: 1

  run-tests:
    needs: [get-targets, download-artifacts]
    runs-on: macos-latest
    strategy:
      matrix:
        target: ${{ fromJSON(needs.get-targets.outputs.targets) }}
    steps:
      - name: Checkout Cobalt (Sparse)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            cobalt/testing/filters
            .github
            cobalt/tools

      - name: Download from GitHub Actions
        uses: actions/download-artifact@v4
        with:
          name: tvos-test-artifacts

      - name: Run Test in Simulator
        id: run-tests
        env:
          TARGET: ${{ matrix.target }}
        run: |
          tar -xzf "${TARGET}.tar.gz"

          mkdir -p results

          filter_file="cobalt/testing/filters/tvos-arm64-simulator/${TARGET}_filter.json"
          gtest_args=()
          if [[ -f "${filter_file}" ]]; then
            echo "Found filter file: ${filter_file}"
            failing_tests=$(jq -r '.failing_tests | join(":")' "${filter_file}")
            if [[ -n "${failing_tests}" ]]; then
              gtest_args+=(-c "--gtest_filter=-${failing_tests}")
              echo "Applying gtest_filter: -${failing_tests}"
            fi
          fi

          xml_path="${GITHUB_WORKSPACE}/results/${TARGET}_result.xml"
          log_path="${GITHUB_WORKSPACE}/results/${TARGET}_log.txt"

          gtest_args+=(-c "--gtest_output=xml:${xml_path}")

          ./iossim \
            -x tvos \
            -d "Apple TV 4K (3rd generation)" \
            -v \
            -i \
            "${gtest_args[@]}" \
            "./${TARGET}.app" 2>&1 | tee "${log_path}" || true

          if [[ ! -f "${xml_path}" ]]; then
            echo "XML result not found. Generating crash report."
            python3 .github/scripts/generate_crash_report.py "${log_path}" "${xml_path}"
          fi

      - name: Test Results
        if: always()
        uses: ./.github/actions/process_test_results
        with:
          target_name: ${{ matrix.target }}
          results_glob: results/${{ matrix.target }}_result.xml
          log_glob: results/${{ matrix.target }}_log.txt
          num_gtest_shards: 1
          datadog_api_key: ""

      - name: Archive Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tvos_${{ matrix.target }}_test_results
          path: results/*
