name: Cached Checkout
description: Generic git checkout with bare repository cache support.
inputs:
  repository:
    description: The url of the repo to checkout. Defaults to Cobalt.
    default: ${{ github.server_url }}/${{ github.repository }}
  ref:
    description: Git ref to checkout.
    required: true
  path:
    description: Destination path.
    required: true
  fetch_depth:
    description: Number of commits to fetch.
    default: '1'
  use_cache:
    description: Whether to attempt using /runner-cache.
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Set Cache Path
      id: cache-path
      shell: bash
      env:
        USE_CACHE: ${{ inputs.use_cache }}
      run: |
        if [[ "${USE_CACHE}" == "true" ]] && [[ -w "/runner-cache" ]]; then
          echo "path=/runner-cache" >> ${GITHUB_OUTPUT}
        else
          echo "path=" >> ${GITHUB_OUTPUT}
        fi

    - name: Set Up Runner Cache
      id: setup-cache
      if: steps.cache-path.outputs.path != ''
      env:
        REPO_URL: ${{ inputs.repository }}
        RUNNER_CACHE_FOLDER: ${{ steps.cache-path.outputs.path }}
      shell: bash
      run: |
        set -ex
        cache_path="${RUNNER_CACHE_FOLDER}/git-checkout-cache/$(basename "${REPO_URL}" .git)"
        echo "path=${cache_path}" >> ${GITHUB_OUTPUT}

        # Verify existing cache integrity and remove if broken.
        if [ -d "${cache_path}" ] && ! git -C "${cache_path}" rev-parse --git-dir > /dev/null 2>&1; then
          rm -rf "${cache_path}"
        fi

        # Initialize/update the cache from the network.
        (
          mkdir -p "$(dirname "${cache_path}")"
          flock -x 9
          if [ ! -d "${cache_path}/.git" ]; then
            mkdir -p "$(dirname "${cache_path}")"
            tmp_path="${cache_path}.tmp.${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            rm -rf "${tmp_path}"
            git clone --filter=blob:none "${REPO_URL}" "${tmp_path}"
            mv "${tmp_path}" "${cache_path}"
          else
            # Only fetch if it hasn't been fetched recently (e.g., in the last 5 minutes)
            # to reduce contention and network usage.
            last_fetch=$(stat -c %Y "${cache_path}/FETCH_HEAD" 2>/dev/null || echo 0)
            now=$(date +%s)
            if (( now - last_fetch > 300 )); then
              echo "Updating cache..."
              git -C "${cache_path}" fetch --prune origin
            else
              echo "Cache is fresh, skipping fetch."
            fi
          fi
        ) 9>"${cache_path}.lock"

    - name: Clone Repo
      env:
        REPO_URL: ${{ inputs.repository }}
        REF: ${{ inputs.ref }}
        DEST_PATH: ${{ inputs.path }}
        CACHE_PATH: ${{ steps.setup-cache.outputs.path }}
      shell: bash
      run: |
        set -ex

        if [ -n "${CACHE_PATH}" ] && [ -d "${CACHE_PATH}/.git" ]; then
          echo "Populating checkout via rsync hardlinks from ${CACHE_PATH} to ${GITHUB_WORKSPACE}/${DEST_PATH}..."
          mkdir -p "${GITHUB_WORKSPACE}/${DEST_PATH}"
          rsync -arv --link-dest="${CACHE_PATH}" "${CACHE_PATH}/" "${GITHUB_WORKSPACE}/${DEST_PATH}/"
        else
          echo "No cache available. Performing regular git clone..."
          git clone --filter=blob:none "${REPO_URL}" "${GITHUB_WORKSPACE}/${DEST_PATH}"
        fi

        git config --global --add safe.directory "${GITHUB_WORKSPACE}/${DEST_PATH}"

        git -C "${GITHUB_WORKSPACE}/${DEST_PATH}" fetch origin "${REF}"
        git -C "${GITHUB_WORKSPACE}/${DEST_PATH}" checkout "${REF}"
