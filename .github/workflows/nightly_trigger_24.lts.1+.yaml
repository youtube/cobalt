name: nightly_trigger_24.lts.1+

on:
  schedule:
    # GMT timezone.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions: {}

env:
  GITHUB_REPO: ${{ github.repository }}

jobs:
  trigger_24:
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nightly
        run: |
          set -x
          gh workflow run android_24.lts.1+ --ref 24.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run evergreen_24.lts.1+ --ref 24.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run linux_24.lts.1+ --ref 24.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run raspi-2_24.lts.1+ --ref 24.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run win32_24.lts.1+ --ref 24.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
