name: tvos_staging

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches:
      - staging
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Nightly workflow.'
        required: true
        type: boolean
        default: false

permissions: read-all

jobs:
  get-sha:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.set-sha.outputs.sha }}
    steps:
      - id: set-sha
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${PUSH_SHA}" >> "$GITHUB_OUTPUT"
          fi

  wait-for-kokoro-build:
    needs: get-sha
    runs-on: ubuntu-latest
    timeout-minutes: 150 # 2.5 hours timeout to ensure we don't block forever but allow 2h polling
    outputs:
      invocation_id: ${{ steps.poll-status.outputs.invocation_id }}
    steps:
      - name: Poll GitHub Statuses API for Kokoro build
        id: poll-status
        env:
          COMMIT_SHA: ${{ needs.get-sha.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Polling GitHub Statuses API for Kokoro status on commit ${COMMIT_SHA}..."
          for i in {1..240}; do # Poll for 2 hours (240 * 30s)
            echo "Attempt ${i}/240..."
            statuses=$(gh api "repos/youtube/cobalt/commits/${COMMIT_SHA}/statuses")

            echo "--- Current Statuses ---"
            echo "${statuses}" | jq -r '.[] | "\(.context): \(.state) (\(.description))"'
            echo "----------------------"

            # Select the latest kokoro status
            target_status=$(echo "${statuses}" | jq -c '[.[] | select(.context == "kokoro")][0]')

            if [[ -n "${target_status}" && "${target_status}" != "null" ]]; then
              state=$(echo "${target_status}" | jq -r '.state')
              description=$(echo "${target_status}" | jq -r '.description')
              target_url=$(echo "${target_status}" | jq -r '.target_url')
              invocation_id="${target_url##*/}"

              echo "Found target status: kokoro"
              echo "State: ${state} | Description: ${description}"
              echo "Kokoro Invocation ID: ${invocation_id}"
              echo "Kokoro ResultStore URL: ${target_url}"

              if [[ "${state}" == "success" ]]; then
                echo "Kokoro build succeeded!"
                echo "invocation_id=${invocation_id}" >> "$GITHUB_OUTPUT"
                exit 0
              elif [[ "${state}" == "failure" || "${state}" == "error" ]]; then
                echo "Kokoro build failed with state: ${state}"
                exit 1
              fi
              # If state is "pending", we continue waiting
            else
              echo "Kokoro status not found yet."
            fi

            echo "Waiting 30 seconds..."
            sleep 30
          done
          echo "Timeout waiting for Kokoro build."
          exit 1

  download-artifacts:
    needs: [get-sha, wait-for-kokoro-build]
    runs-on: [self-hosted, chrobalt-linux-runner]
    steps:
      - name: Set Up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Artifacts from GCS
        env:
          INVOCATION_ID: ${{ needs.wait-for-kokoro-build.outputs.invocation_id }}
        run: |
          BUCKET="cobalt-unittest-storage"
          PLATFORM="tvos-arm64-simulator"
          CONFIG="devel"
          gcloud storage cp "gs://${BUCKET}/kokoro/build/${PLATFORM}_${CONFIG}/${INVOCATION_ID}/cobalt_browsertests.tar.gz" .

      - name: Upload to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: tvos-test-artifacts
          path: cobalt_browsertests.tar.gz
          retention-days: 1

  run-tests:
    needs: download-artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout Cobalt (Sparse)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            cobalt/testing/filters

      - name: Download from GitHub Actions
        uses: actions/download-artifact@v4
        with:
          name: tvos-test-artifacts

      - name: Run Cobalt Browser Tests in Simulator
        run: |
          tar -xzf cobalt_browsertests.tar.gz
          # We assume iossim is included in the tarball.
          ./iossim \
            -x tvos \
            -d "Apple TV 4K (3rd generation)" \
            -v \
            -i \
            -c '--gtest_filter=ContentMainRunnerImplBrowserTest.*' \
            ./cobalt_browsertests.app
