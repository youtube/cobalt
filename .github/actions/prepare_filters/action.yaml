name: Prepare Filters
description: Downloads previous test results and prepares the filter directory.
inputs:
  test_results_key:
    description: "Artifact key used to store test results."
    required: true
  platform:
    description: "The platform being tested."
    required: true

runs:
  using: "composite"
  steps:
    - name: Download Previous Results
      if: github.run_attempt > 1
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: ${{ inputs.test_results_key }}
        path: previous_results/
    - name: Prepare Filter Directory
      env:
        PLATFORM: ${{ inputs.platform }}
      run: |
        # Prepare resolved filter directory.
        set -ex
        RESOLVED_FILTER_DIR="${GITHUB_WORKSPACE}/resolved_filters"
        mkdir -p "${RESOLVED_FILTER_DIR}"
        echo "RESOLVED_FILTER_DIR=${RESOLVED_FILTER_DIR}" >> $GITHUB_ENV

        cp -r "${GITHUB_WORKSPACE}/cobalt/testing/filters/${PLATFORM}"/* "${RESOLVED_FILTER_DIR}/" || true

        # Overwrite with retry filters from previous results if they exist.
        if [ -d "${GITHUB_WORKSPACE}/previous_results/${PLATFORM}/retry_filters" ]; then
          cp -r "${GITHUB_WORKSPACE}/previous_results/${PLATFORM}/retry_filters"/* "${RESOLVED_FILTER_DIR}/" || true
        fi
      shell: bash
