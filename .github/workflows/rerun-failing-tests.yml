name: Rerun Failing Templated Test Jobs
on:
  workflow_run:
    workflows: ["android", "raspi-2-modular", "evergreen", "linux"]
    types:
      - completed

# Declare default permissions as read only.
permissions: read-all

jobs:
  rerun-failing-jobs:
    runs-on: ubuntu-latest
    if: contains(github.event.workflow_run.conclusion, ['failure', 'cancelled'])
    permissions:
      actions: write
      checks: read
      pull-requests: read # Read-only access to get PR/commit info
    env:
      MAX_RETRIES: 2
    steps:
      - name: Get PR Number and Commit SHA
        id: event_details
        shell: bash
        run: |
          echo "pr_number=$(jq --raw-output '.pull_requests[0].number' ${{ github.event.workflow_run.event_path }})" >> ${GITHUB_OUTPUT}
          echo "commit_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
      - name: Check Retry Count
        id: retry_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          workflow_name="${{ github.workflow }}"
          commit_sha="${{ steps.event_details.outputs.commit_sha }}"

          echo "Checking previous runs of workflow '${workflow_name}' on commit '${commit_sha}'"

          # This command lists completed runs of this *same workflow* for the specific commit that failed.
          retry_count=$(gh run list --workflow "${workflow_name}" --commit "${commit_sha}" --event "workflow_run" --status "completed" --json "databaseId" -q "length")

          echo "Found ${retry_count} previous retry attempt(s)."

          if [ "${retry_count}" -ge "${MAX_RETRIES}" ]; then
            echo "::error::Maximum number of retries (${MAX_RETRIES}) exceeded."
            echo "continue=false" >> ${GITHUB_OUTPUT}
          else
            echo "Retry attempt #${retry_count} is within the limit (${MAX_RETRIES})."
            echo "continue=true" >> ${GITHUB_OUTPUT}
          fi

      - name: Rerun Failing Checks
        if: steps.retry_check.outputs.continue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.event_details.outputs.pr_number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          echo "Fetching failing checks for PR #${PR_NUMBER}"
          failing_runs=$(gh pr checks "${PR_NUMBER}" --repo "${REPO}" | grep -E 'fail|cancel')

          if [ -z "${failing_runs}" ]; then
            echo "No failing checks found to rerun."
            exit 0
          fi

          echo "Found failing checks to rerun:"
          echo "${failing_runs}"

          run_ids_to_rerun=$(echo "${failing_runs}" | python3 ./.github/scripts/extract_run_ids.py)

          if [ -z "${run_ids_to_rerun}" ]; then
            echo "Could not extract run IDs from failing checks."
            exit 0 # Exit gracefully, don't fail the workflow
          fi

          echo "The following run IDs will be re-run: ${run_ids_to_rerun}"
          for run_id in ${run_ids_to_rerun}; do
            echo "Rerunning run ID: ${run_id}"
            gh run rerun "${run_id}" --repo "${REPO}"
          done
