name: Workflow Debug

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches:
      - main
      - experimental/*
      - feature/*
  push:
    branches:
      - main
      - experimental/*
      - feature/*

permissions: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "::group:: Dump GitHub context"
          echo "${GITHUB_CONTEXT}"
          echo "::endgroup::"
        shell: bash
      - name: Dump job context
        env:
          JOB_CONTEXT: ${{ toJson(job) }}
        run: |
          echo "::group:: Dump job context"
          echo "${JOB_CONTEXT}"
          echo "::endgroup::"
        shell: bash
      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: |
          echo "::group:: Dump steps context"
          echo "${STEPS_CONTEXT}"
          echo "::endgroup::"
        shell: bash
      - name: Dump runner context
        env:
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: |
          echo "::group:: Dump runner context"
          echo "${RUNNER_CONTEXT}"
          echo "::endgroup::"
        shell: bash
      - name: Default environment variables
        run: |
          echo "::group:: Default environment variables"
          echo "The job_id is: ${GITHUB_JOB}"
          echo "The id of this action is: ${GITHUB_ACTION}"
          echo "The run id is: ${GITHUB_RUN_ID}"
          echo "The GitHub Actor's username is: ${GITHUB_ACTOR}"
          echo "GitHub SHA: ${GITHUB_SHA}"
          echo "::endgroup::"
        shell: bash
      - name: Rate limit info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group:: Rate limit info"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /rate_limit
          echo "::endgroup::"
        shell: bash
