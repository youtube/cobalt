name: linux

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - experimental/*
      - feature/*
  push:
    branches:
      - main
      - experimental/*
      - feature/*
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Nightly workflow.'
        required: true
        type: boolean
        default: false
      label_name:
        description: 'Label that triggered this run.'
        required: false
        type: string
        default: ''

permissions: read-all

jobs:
  # This is default Chromium build config
  chromium_linux-x64:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: chromium_linux
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  # This is default Cobalt build config
  linux:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: linux
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  # This is cobalt on linux using modular build config
  linux-modular:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: linux-modular
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  # This is content_shell without starboard
  linux-web-tests:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: linux-web-tests
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
