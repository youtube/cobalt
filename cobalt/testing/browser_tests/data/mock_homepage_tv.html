<!DOCTYPE html>
<html>
<head>
  <title>Mock YouTube TV</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #f1f1f1;
      font-family: Roboto, Arial, sans-serif;
      margin: 0;
      overflow: hidden;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 100px;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    .sidebar-item {
      width: 40px;
      height: 40px;
      background-color: #333;
      margin-bottom: 20px;
      border-radius: 50%;
    }
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background-color: #1f1f1f;
      border-radius: 8px;
      overflow: hidden;
    }
    .thumbnail {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
    .info {
      padding: 10px;
    }
    .title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .metadata {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-item"></div>
      <div class="sidebar-item"></div>
      <div class="sidebar-item"></div>
      <div class="sidebar-item"></div>
    </div>
    <div class="main">
      <h1>Home</h1>
      <div class="grid" id="video-grid">
        <!-- Cards will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    // Simulate large DOM with multiple images
    const grid = document.getElementById('video-grid');
    const images = [
      'mock_thumbnail.jpeg',
      'mock_thumbnail_2.jpeg',
      'mock_thumbnail_3.jpeg',
      'mock_thumbnail_4.jpeg',
      'mock_thumbnail_5.jpeg'
    ];
    const numCards = 500; // Bloat DOM
    for (let i = 0; i < numCards; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      const imgSrc = images[i % images.length];
      card.innerHTML = `
        <img class="thumbnail" src="${imgSrc}">
        <div class="info">
          <div class="title">Mock Video Title ${i}</div>
          <div class="metadata">Mock Channel • ${i}K views • 1 day ago</div>
        </div>
      `;
      grid.appendChild(card);
    }

    // Simulate large JS Heap
    const largeData = [];
    for (let i = 0; i < 100000; i++) {
      largeData.push({
        id: i,
        title: `Video ${i}`,
        description: "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
        tags: ["mock", "test", "youtube", "tv"],
        views: Math.floor(Math.random() * 1000000)
      });
    }
    window.myLargeData = largeData; // Keep it in memory
    console.log("Mock page initialized with " + numCards + " cards and large data array.");
  </script>
</body>
</html>
