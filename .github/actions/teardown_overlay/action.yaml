name: Teardown OverlayFS Workspace
description: Unmounts the OverlayFS and deletes the upper layer changes.

inputs:
  path:
    description: Destination path (e.g. cobalt).
    required: true

runs:
  using: "composite"
  steps:
    - name: Teardown Workspace
      shell: bash
      run: |
        MERGED_DIR="${GITHUB_WORKSPACE}/${{ inputs.path }}"
        UPPER_DIR="/runner-cache/workspaces/${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}/upper"
        WORK_DIR="/runner-cache/workspaces/${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}/work"

        # Unmount the overlay. Use || true so we don't fail the job if it's already unmounted.
        fusermount3 -u "$MERGED_DIR" || fusermount -u "$MERGED_DIR" || umount "$MERGED_DIR" || true

        # Delete the changes. The golden workspace on the SSD is completely untouched.
        rm -rf "$UPPER_DIR" "$WORK_DIR"

        echo "OverlayFS workspace destroyed. SSD restored to pristine state."
