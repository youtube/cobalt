name: nightly_trigger_26.android

on:
  schedule:
    # GMT timezone.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions: {}

env:
  GITHUB_REPO: ${{ github.repository }}

jobs:
  trigger_26:
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nightly
        run: |
          set -x
          gh workflow run android_26.android --ref 26.android -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run linux_26.android --ref 26.android -f nightly=true --repo "${GITHUB_REPO}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
