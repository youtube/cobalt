name: Autoroll LTS

on:
  schedule:
    - cron: '0 * * * *' # Hourly.
  workflow_dispatch:
    inputs:
      start_commit:
        description: 'The commit to start rolling from, should point to the last release chore'
        type: string
        default: '2079b05a9fee4de18abd188fa4a6aceb01a77d7e'
      max_commits:
        description: 'Max number of commits to include on a single PR'
        type: number
        default: 25

permissions:
  contents: read

jobs:
  autoroll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            .github
            .gitmodules
          token: ${{ secrets.CHERRY_PICK_TOKEN }}

      - name: Setup Git user
        run: |
          git config --global user.name "GitHub Release Automation"
          git config --global user.email "github@google.com"
          git config --global submodule.recurse false

      - name: Prepare Cherry Pick Branch
        env:
          TARGET_BRANCH: 27.lts
        run: |
          set -x

          # Copy the script from the main branch before switching branches.
          cp .github/scripts/autoroll_lts.py "${RUNNER_TEMP}"/

          # Check out existing autoroll branch if it exists on remote, otherwise create from target branch.
          if git checkout -B "autoroll-to-${TARGET_BRANCH}" "origin/autoroll-to-${TARGET_BRANCH}" --no-track 2>/dev/null; then
            echo "Checked out existing autoroll branch."
          else
            git checkout -B "autoroll-to-${TARGET_BRANCH}" "origin/${TARGET_BRANCH}" --no-track
          fi

      - name: Cherry Pick Merged PRs
        id: autoroll
        env:
          TARGET_BRANCH: 27.lts
          START_COMMIT: ${{ inputs.start_commit }}
          MAX_COMMITS: ${{ inputs.max_commits || 25 }}
        run: |
          set -x

          # Construct command line arguments robustly.
          # If START_COMMIT is empty, omit the flag so Python's native argparse default handles it.
          ARGS=(--target-branch "${TARGET_BRANCH}" --max-commits "${MAX_COMMITS}")
          if [[ -n "${START_COMMIT}" ]]; then
            ARGS+=(--start-commit "${START_COMMIT}")
          fi

          # Run the Python script to perform cherry-picks and get all PR links.
          PR_LINKS=$(python3 "${RUNNER_TEMP}/autoroll_lts.py" "${ARGS[@]}")

          if [[ -n "${PR_LINKS}" ]]; then
            echo "cherry_picked=true" >> "$GITHUB_OUTPUT"
            {
              echo "pr_links<<EOF"
              echo "${PR_LINKS}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No commits to roll found."
          fi

      - name: Push and Create PR
        if: steps.autoroll.outputs.pr_links != ''
        env:
          TARGET_BRANCH: 27.lts
          GITHUB_TOKEN: ${{ secrets.CHERRY_PICK_TOKEN }}
          PR_LINKS: ${{ steps.autoroll.outputs.pr_links }}
        run: |
          set -x

          git push origin "autoroll-to-${TARGET_BRANCH}"

          PR_BODY_FILE=$(mktemp)
          {
            echo "Automated cherry-pick roll to ${TARGET_BRANCH}."
            echo ""
            echo "Original pull requests:"
            echo "${PR_LINKS}"
          } > "${PR_BODY_FILE}"

          PR_TITLE="Autoroll from main to ${TARGET_BRANCH}"

          # Query open pull requests robustly without failing exit codes
          PR_NUMBER=$(gh pr list --head "autoroll-to-${TARGET_BRANCH}" --state open --json number --jq '.[0].number')

          if [[ -n "$PR_NUMBER" ]]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" -f title="${PR_TITLE}" -f body="$(cat "${PR_BODY_FILE}")" --jq .html_url
          else
            gh pr create --base "${TARGET_BRANCH}" --head "autoroll-to-${TARGET_BRANCH}" --title "${PR_TITLE}" --body-file "${PR_BODY_FILE}" --reviewer linxinan-chops,oxve
          fi
