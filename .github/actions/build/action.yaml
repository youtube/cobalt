name: Build Cobalt
description: Builds Cobalt targets
inputs:
  targets:
    description: "JSON list of ninja targets for Cobalt build."
    required: true
  test_root_target:
    description: "The root target from which to deduce what tests to run."
    required: true
  test_targets_json_file:
    description: "The path to the file the test targets are written to."
    required: true
  enable_sccache:
    description: Use sccache for build acceleration.
    default: 'false'
  sccache_gcs_key:
    description: GCS SA key to read/write to bucket
runs:
  using: "composite"
  steps:
      - name: Clean out dir from previous runner
        run: |
          rm -rf cobalt/src/out
        shell: bash
      - name: Install sccache
        if: inputs.enable_sccache == 'true'
        uses: ./.github/actions/sccache
        with:
          sccache_gcs_key: ${{ inputs.sccache_gcs_key }}
      - name: GN gen
        env:
          ENABLE_SCCACHE: ${{ inputs.enable_sccache }}
        run: |
          cd cobalt/src
          gn_flags=()
          if [[ "${{ matrix.platform }}" == *"tvos"* ]]; then
            # TvOS does not use RBE unless it's sccache
            gn_flags+=(--no-rbe)
          fi
          if [[ $ENABLE_SCCACHE == "true" ]]; then
            gn_flags+=(--use-sccache)
          fi
          cobalt/build/gn.py -p ${{ matrix.platform }} -C ${{ matrix.config }} "${gn_flags[@]}"
        shell: bash
      - name: Configure Siso Credential Helper
        shell: bash
        run: |
          echo "SISO_CREDENTIAL_HELPER=gcloud" >> $GITHUB_ENV
      - name: List GN args
        run: |
          cd cobalt/src
          gn args --list --short --overrides-only out/${{ matrix.platform }}_${{ matrix.config }}
        shell: bash
      - name: Get list of changed files
        if: github.event_name == 'pull_request'
        id: changed-files
        env:
          CHANGED_FILES_LIST: changed_files.txt
        run: |
          set -x
          cd cobalt/src
          # GitHub's actions/checkout action, by default, checks out the merge commit when
          # a pull request event triggers a workflow. This merge commit represents the state
          # of the code as if the pull request had been merged into the base branch.
          # Setting fetch-depth to 2 effectively gets a merge commit (i.e. HEAD) and the
          # HEAD commit from the base branch (i.e. HEAD~1).
          git diff --name-only HEAD~1 HEAD > ${CHANGED_FILES_LIST}
          cat ${CHANGED_FILES_LIST}
        shell: bash
      - name: GN Analyze
        id: analyze
        if: github.event_name == 'pull_request'
        env:
          CHANGED_FILES_LIST: changed_files.txt
        shell: bash
        run: |
          set -euo pipefail
          cd cobalt/src

          # Default to running autoninja unless proven otherwise.
          echo "skip_autoninja=false" >> $GITHUB_OUTPUT

          # If no files changed, run build normally.
          if [[ ! -s "${CHANGED_FILES_LIST}" ]]; then
            exit 0
          fi

          # Prepare input.json for gn analyze.
          # GN expects source file paths to be prefixed with '//' (e.g., //cobalt/browser/main.cc).
          FILES_JSON=$(jq -R -s -c 'split("\n") | map(select(length > 0) | "//" + .)' < "${CHANGED_FILES_LIST}")

          # We evaluate against additional_compile_targets: ["all"] to determine if the modified files
          # affect any output in the entire Ninja build graph. test_targets is kept empty because
          # test binaries are already built as compile targets under "all".
          jq -n --argjson files "$FILES_JSON" '{
            files: $files,
            additional_compile_targets: ["all"],
            test_targets: []
          }' > gn_analyze_input.json

          echo "GN Analyze Input:"
          cat gn_analyze_input.json

          # Run gn analyze against the configured Ninja build directory.
          gn analyze out/${{ matrix.platform }}_${{ matrix.config }} gn_analyze_input.json gn_analyze_output.json

          echo "GN Analyze Output:"
          cat gn_analyze_output.json

          # Parse status to see if changes affect the build graph.
          STATUS=$(jq -r '.status' gn_analyze_output.json)
          if [[ "$STATUS" == "No dependency" ]]; then
            echo "GN Analyze reported 'No dependency'. Pruning autoninja build!"
            echo "skip_autoninja=true" >> $GITHUB_OUTPUT
          fi
      - name: Calculate test targets
        if: matrix.config == 'devel'
        id: calculate-test-targets
        env:
          CHANGED_FILES_LIST: changed_files.txt
          ROOT_TARGET: ${{ inputs.test_root_target }}
          STATIC_TEST_TARGETS_JSON_FILE: cobalt/build/testing/targets/${{ matrix.platform }}/test_targets.json
          DYN_TEST_TARGETS_JSON_FILE: out/${{ matrix.platform }}_${{ matrix.config }}/dyn_targets.json
        run: |
          set -x
          cd cobalt/src

          # If GN analyze proved no dependency, emit empty test targets so downstream test runners
          # (on-host-test, on-device-test) know there is zero work to do and exit immediately.
          if [[ "${{ steps.analyze.outputs.skip_autoninja }}" == "true" ]]; then
            echo "GN Analyze proved no dependency. Emitting empty test targets."
            echo '{"test_targets": []}' > "${{ inputs.test_targets_json_file }}"
            echo "test_targets_json=[]" >> $GITHUB_OUTPUT
            echo "test_targets_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ ! -f "${STATIC_TEST_TARGETS_JSON_FILE}" ]]; then
            echo "Static test targets file not found at ${STATIC_TEST_TARGETS_JSON_FILE}. Skipping step."
            echo "test_targets_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Copy static test targets definitions over to the output JSON file.
          # Static test targets overwrite dynamic targets to ensure stable pre-verified test suites are executed.
          cp -av "${STATIC_TEST_TARGETS_JSON_FILE}" "${{ inputs.test_targets_json_file }}"

          test_targets_json=$(cat ${{ inputs.test_targets_json_file }} | jq -cr '.test_targets')
          echo "test_targets_json=${test_targets_json}" >> $GITHUB_OUTPUT

          test_targets_count=$(echo ${test_targets_json} | jq -cr 'length')
          echo "test_targets_count=${test_targets_count}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Archive test target JSON
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}_test_targets_json
          path: cobalt/src/out/${{ matrix.platform }}_${{ matrix.config }}/test_targets.json
      - name: Ninja build test targets
        if: ${{ matrix.config == 'devel' && fromJSON(steps.calculate-test-targets.outputs.test_targets_count || 0) > 0 }}
        id: build-test-targets
        run: |
          set -ex
          cd cobalt/src
          test_targets=$(echo '${{ steps.calculate-test-targets.outputs.test_targets_json }}' | jq -cr 'join(" ")')
          time autoninja -C out/${{ matrix.platform }}_${{ matrix.config }} ${test_targets}
        shell: bash
      - name: Ninja build
        if: steps.analyze.outputs.skip_autoninja != 'true'
        env:
          TARGETS_JSON: ${{ inputs.targets }}
          USE_SCCACHE: ${{ inputs.enable_sccache }}
        run: |
          set -ex
          cd cobalt/src
          TARGETS=$(echo "${TARGETS_JSON}" | jq -cr '. | join(" ")')
          time autoninja -C out/${{ matrix.platform }}_${{ matrix.config }} ${TARGETS}
          if [[ $USE_SCCACHE == "true" ]]; then
            sccache --show-stats
          fi
        shell: bash
      - name: Archive Android APKs
        if: steps.analyze.outputs.skip_autoninja != 'true' && startsWith(matrix.platform, 'android') && matrix.config == 'qa'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }} APKs
          path: |
            cobalt/src/out/${{ matrix.platform }}_qa/apks/*.apk
            cobalt/src/out/${{ matrix.platform }}_qa/*_apk/*.apk
            cobalt/src/out/${{ matrix.platform }}_qa/gen/build_info.json
