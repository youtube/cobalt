# Reusable Cobalt CI workflow.

name: main

on:
  workflow_call:
    inputs:
      platform:
        description: 'Cobalt platform.'
        required: true
        type: string
      nightly:
        description: 'Nightly workflow.'
        required: true
        type: string
      run_api_leak_detector:
        description: 'Whether to run the api leak detector.'
        required: false
        type: boolean
        default: false
    secrets:
      datadog_api_key:
        required: false
      sccache_gcs_key:
        required: false

concurrency:
  # Cancel existing jobs on the same workflow, platform, and branch (or sha if merged).
  group: ${{ github.workflow }}-${{ inputs.platform }}-${{ github.event_name }} @ ${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  # List of folders used by CI actions that don't need a full source checkout.
  # All files in the root directory are automatically included.
  CI_ESSENTIALS: |
    .github
    cobalt/build
    cobalt/docker
    cobalt/testing/browser_tests/tools
    cobalt/testing/filters
    cobalt/tools

jobs:
  # Retrieves configuration from json file.
  initialize:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      # Tell gclient not to automatically update depot tools every time it runs.
      DEPOT_TOOLS_UPDATE: 0
      DEPOT_TOOLS_REPORT_BUILD: 0
      DEPOT_TOOLS_COLLECT_METRICS: 0
      DEPOT_TOOLS_METRICS: 0
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PR_REPO_URL: ${{ github.event.pull_request.base.repo.url }}
      GITHUB_EVENT_NUMBER: ${{ github.event.number }}
    if: |
      github.event.action != 'labeled' ||
      (github.event.pull_request.merged == false && (github.event.label.name == 'runtest' || github.event.label.name == 'yts_playback_test'))
    timeout-minutes: 10
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Remove runtest if exists
        if: github.event_name == 'pull_request'
        continue-on-error: true  # Ignore this step if we cannot remove the label.
        run: |
          set +e
          curl \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            ${GITHUB_PR_REPO_URL}/issues/${GITHUB_EVENT_NUMBER}/labels/runtest
        shell: bash
      - name: Check for Dry Run Label
        id: check-dry-run
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci-dry-run') }}" == "true" ]]; then
            echo "DRY_RUN=true" >> $GITHUB_ENV
            echo "dry_run=true" >> $GITHUB_OUTPUT
          else
            echo "DRY_RUN=false" >> $GITHUB_ENV
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Set platforms
        id: set-platforms
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            platforms='["linux-x64x11"]'
          else
            platforms=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -c '.platforms')
          fi
          echo "platforms=${platforms}" >> $GITHUB_OUTPUT
      - name: Select build runners
        id: set-build-runners
        shell: bash
        run: |
          set -x
          build_runners=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -c '.build_runners // ["self-hosted", "chrobalt-linux-runner"]' )
          echo "build_runners=${build_runners}" >> $GITHUB_OUTPUT
      - name: Set build targets
        id: set-targets
        shell: bash
        run: |
          set -x
          targets=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.targets')
          echo "targets=${targets}" >> $GITHUB_OUTPUT
      - name: Set build configs
        id: set-build-configs
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            build_configs='["devel"]'
          else
            # Attempt to load build configs from JSON. If not present use default.
            build_configs=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.build_configs')
            if [[ "${build_configs}" == "null" ]]; then
              build_configs='["devel", "qa", "gold"]'
            fi
          fi
          echo "build_configs=${build_configs}" >> $GITHUB_OUTPUT
      - name: Set platform extra includes
        id: set-includes
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            includes='[{"name": "x64", "platform": "linux-x64x11"}]'
          else
            includes=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -c '.includes')
          fi
          echo "includes=${includes}" >> $GITHUB_OUTPUT
      - name: Set Docker service
        id: set-docker-service
        shell: bash
        run: |
          set -x
          docker_service=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -r '.docker_service // empty')
          echo "docker_service=${docker_service}" >> $GITHUB_OUTPUT
      - name: Set on-host tests
        id: set-test-on-host
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_on_host="true"
          else
            test_on_host=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_on_host')
          fi
          echo "test_on_host=${test_on_host}" >> $GITHUB_OUTPUT
      - name: Set on-device tests
        id: set-test-on-device
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_on_device="false"
          else
            test_on_device=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_on_device')
          fi
          echo "test_on_device=${test_on_device}" >> $GITHUB_OUTPUT
      - name: Set test package
        id: set-test-package
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_package="false"
          else
            test_package=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_package')
          fi
          echo "test_package=${test_package}" >> $GITHUB_OUTPUT
      - name: Set e2e tests
        id: set-test-e2e
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_e2e="false"
          else
            test_e2e=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_e2e')
          fi
          echo "test_e2e=${test_e2e}" >> $GITHUB_OUTPUT
      - name: Set YTS tests
        id: set-test-yts
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_yts="false"
          else
            test_yts=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_yts')
          fi
          echo "test_yts=${test_yts}" >> $GITHUB_OUTPUT
      - name: Set YTS Playback tests
        id: set-test-yts-playback
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_yts_playback="false"
          else
            test_yts_playback=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_yts_playback')
          fi
          echo "test_yts_playback=${test_yts_playback}" >> $GITHUB_OUTPUT
      - name: Set Browser tests
        id: set-test-browser
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_browser="false"
          else
            test_browser=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_browser')
          fi
          echo "test_browser=${test_browser}" >> $GITHUB_OUTPUT
      - name: Set YTS WPT tests
        id: set-test-yts-wpt
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            test_yts_wpt="false"
          else
            test_yts_wpt=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_yts_wpt')
          fi
          echo "test_yts_wpt=${test_yts_wpt}" >> $GITHUB_OUTPUT
      - name: Set web tests
        id: set-web-tests
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            web_tests="false"
          else
            web_tests=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.web_tests')
          fi
          echo "web_tests=${web_tests}" >> $GITHUB_OUTPUT
      - name: Set root target for unit tests
        id: set-test-root-target
        shell: bash
        run: |
          set -x
          test_root_target=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_root_target')
          echo "test_root_target=${test_root_target}" >> $GITHUB_OUTPUT
      - name: Set E2E test device type
        id: set-test-device-family
        shell: bash
        run: |
          set -x
          test_device_family=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_device_family // empty')
          echo "test_device_family=${test_device_family}" >> $GITHUB_OUTPUT
      - name: Set YTS test targets
        id: set-yts-test-targets
        shell: bash
        run: |
          set -x
          yts_test_targets=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.yts_test_targets // []')
          echo "yts_test_targets=${yts_test_targets}" >> $GITHUB_OUTPUT
      - name: Set YTS Playback test targets
        id: set-yts-playback-test-targets
        shell: bash
        run: |
          set -x
          yts_playback_test_targets=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.yts_playback_test_targets // []')
          echo "yts_playback_test_targets=${yts_playback_test_targets}" >> $GITHUB_OUTPUT
      - name: Set Browser test targets
        id: set-browser-test-targets
        shell: bash
        run: |
          set -x
          browser_test_targets=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.browser_test_targets // []')
          echo "browser_test_targets=${browser_test_targets}" >> $GITHUB_OUTPUT

          # Also export just the target strings for the results matrix.
          browser_test_targets_json=$(echo "${browser_test_targets}" | jq -c 'map(.target)')
          echo "browser_test_targets_json=${browser_test_targets_json}" >> $GITHUB_OUTPUT

          # Centralize "should run browser tests" logic.
          # A platform "should run browser tests" only if the test_browser flag is
          # true AND we have resolved valid targets. This prevents hangs on
          # platforms that may have the flag enabled but no defined tests, or
          # for host platforms (like Linux) where targets might be filtered out
          # based on the primary target list.
          if [[ "${{ steps.set-test-browser.outputs.test_browser }}" == "true" && "${browser_test_targets_json}" != "[]" ]]; then
            echo "run_browser_tests=true" >> $GITHUB_OUTPUT
          else
            echo "run_browser_tests=false" >> $GITHUB_OUTPUT
          fi
      - name: Set YTS WPT test targets
        id: set-yts-wpt-test-targets
        shell: bash
        run: |
          set -x
          yts_wpt_test_targets=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.yts_wpt_test_targets // []')
          echo "yts_wpt_test_targets=${yts_wpt_test_targets}" >> $GITHUB_OUTPUT
      - name: Set E2E test targets
        id: set-e2e-test-targets
        shell: bash
        run: |
          set -x
          e2e_test_targets=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -cr '.e2e_test_targets // []')
          echo "e2e_test_targets=${e2e_test_targets}" >> $GITHUB_OUTPUT
      - name: Set test device dimensions
        id: set-test-dimensions
        shell: bash
        run: |
          set -x
          test_dimensions=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_dimensions')
          echo "test_dimensions=${test_dimensions}" >> $GITHUB_OUTPUT
      - name: Set test attempts
        id: set-test-attempts
        shell: bash
        run: |
          set -x
          test_attempts=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.test_attempts // empty')
          echo "test_attempts=${test_attempts}" >> $GITHUB_OUTPUT
      - name: Set number of on-host unit test shards
        id: set-gtest-shards
        shell: bash
        run: |
          set -x
          if [[ "${DRY_RUN}" == "true" ]]; then
            num_gtest_shards=1
          else
            # Retrieve number of shards from config. If not specified, default to 1 shard with `echo 1`.
            num_gtest_shards=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.num_gtest_shards // 1' )
          fi
          echo "num_gtest_shards=${num_gtest_shards}" >> $GITHUB_OUTPUT

          # Create a zero-indexed list of shards for use by matrix, e.g. [0,1,2,3,4,5].
          gtest_shards="[$(seq -s, 0 1 $((${num_gtest_shards} - 1)))]"
          echo "gtest_shards=${gtest_shards}" >> $GITHUB_OUTPUT
      - name: Set enable sccache
        id: set-enable-sccache
        shell: bash
        run: |
          set -x
          enable_sccache=$(cat ${GITHUB_WORKSPACE}/.github/config/${{ inputs.platform }}.json | jq -rc '.enable_sccache')
          echo "enable_sccache=${enable_sccache}" >> $GITHUB_OUTPUT
      - name: Set Docker files checksum
        id: set-docker-hash
        shell: bash
        run: |
          set -x
          docker_content_sha=$(find cobalt/docker docker-compose.yaml -type f -exec sha256sum -b {} + | LC_ALL=C sort | sha256sum | head -c 64)
          echo "docker_content_sha=${docker_content_sha}" >> $GITHUB_OUTPUT
      - name: Evaluate CI Pruning
        id: prune
        shell: bash
        run: |
          set -euo pipefail
          # Default to running CI unless proven otherwise.
          echo "skip_ci=false" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # 1. Fetch base branch to compare changes.
            git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
            git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > changed_files.txt

            # 2. BANNED FILES (Global Invalidators).
            # If a PR touches any of these, we immediately enforce a full CI run.
            ban_patterns=(
              '^\.github/'
              '^DEPS$'
              '\.py$'
              '\.sh$'
              '\.txt$'
              '\.in$'
              '^\.vpython3$'
              '^docker-compose\.yaml$'
              '^cobalt/docker/'
              '^cobalt/testing/filters/'
              '^\.clang-'
              '^\.pylintrc$'
              '^CPPLINT\.cfg$'
              '^\.pre-commit-config\.yaml$'
            )

            # 3. ALLOWLIST (Documentation & Metadata).
            # Files that are 100% safe to skip CI.
            allow_patterns=(
              '\.md$'               # Markdown documentation
              '^docs/'              # Documentation directory
              '^OWNERS$'            # Directory owner manifests
              '^AUTHORS$'           # Contributor list
              '^LICENSE'            # License and legal files
              '^DIR_METADATA$'      # Directory metadata
              '^WATCHLISTS$'        # Watchlist manifests
              '^\.gitignore$'       # Git ignore configurations
              '^\.gitattributes$'   # Git attributes
            )

            # 4. EVALUATION LOGIC
            # Read every changed file path robustly, handling trailing newlines properly.
            skip_ci=true
            while IFS= read -r filename || [ -n "$filename" ]; do
              [[ -z "$filename" ]] && continue

              # Check if file is in the Ban List
              for pattern in "${ban_patterns[@]}"; do
                if [[ "$filename" =~ $pattern ]]; then
                  echo "Banned file changed: '$filename'. Triggering full CI."
                  skip_ci=false
                  break 2
                fi
              done

              # Check if file is C++ / GN source (needs gn analyze in build job)
              if [[ "$filename" =~ \.cc$ || "$filename" =~ \.h$ || "$filename" =~ \.gn$ || "$filename" =~ \.gni$ ]]; then
                echo "Source file changed: '$filename'. Triggering CI for gn analyze."
                skip_ci=false
                break
              fi

              # Check if file is in Allowlist
              file_matched_allow=false
              for pattern in "${allow_patterns[@]}"; do
                if [[ "$filename" =~ $pattern ]]; then
                  file_matched_allow=true
                  break
                fi
              done

              # If file is not banned, not C++, and not in allowlist, run CI for safety.
              if [[ "$file_matched_allow" == "false" ]]; then
                echo "Unlisted file type changed: '$filename'. Triggering CI for safety."
                skip_ci=false
                break
              fi
            done < changed_files.txt

            if [[ "$skip_ci" == "true" ]]; then
              echo "All changed files are documentation or metadata. Safely pruning CI!"
              echo "skip_ci=true" >> $GITHUB_OUTPUT
            fi
          fi
    outputs:
      dry_run: ${{ steps.check-dry-run.outputs.dry_run }}
      skip_ci: ${{ steps.prune.outputs.skip_ci }}
      platforms: ${{ steps.set-platforms.outputs.platforms }}
      build_runners: ${{ steps.set-build-runners.outputs.build_runners }}
      targets: ${{ steps.set-targets.outputs.targets }}
      build_configs: ${{ steps.set-build-configs.outputs.build_configs }}
      includes: ${{ steps.set-includes.outputs.includes }}
      docker_content_sha: ${{ steps.set-docker-hash.outputs.docker_content_sha }}
      gtest_shards: ${{ steps.set-gtest-shards.outputs.gtest_shards }}
      test_on_host: ${{ steps.set-test-on-host.outputs.test_on_host }}
      test_on_device: ${{ steps.set-test-on-device.outputs.test_on_device }}
      test_package: ${{ steps.set-test-package.outputs.test_package }}
      test_e2e: ${{ steps.set-test-e2e.outputs.test_e2e }}
      test_yts: ${{ steps.set-test-yts.outputs.test_yts }}
      test_yts_playback: ${{ steps.set-test-yts-playback.outputs.test_yts_playback }}
      test_browser: ${{ steps.set-test-browser.outputs.test_browser }}
      test_yts_wpt: ${{ steps.set-test-yts-wpt.outputs.test_yts_wpt }}
      web_tests: ${{ steps.set-web-tests.outputs.web_tests }}
      test_root_target: ${{ steps.set-test-root-target.outputs.test_root_target }}
      test_device_family: ${{ steps.set-test-device-family.outputs.test_device_family }}
      yts_test_targets: ${{ steps.set-yts-test-targets.outputs.yts_test_targets }}
      yts_playback_test_targets: ${{ steps.set-yts-playback-test-targets.outputs.yts_playback_test_targets }}
      browser_test_targets: ${{ steps.set-browser-test-targets.outputs.browser_test_targets }}
      run_browser_tests: ${{ steps.set-browser-test-targets.outputs.run_browser_tests }}
      yts_wpt_test_targets: ${{ steps.set-yts-wpt-test-targets.outputs.yts_wpt_test_targets }}
      e2e_test_targets: ${{ steps.set-e2e-test-targets.outputs.e2e_test_targets }}
      browser_test_targets_json: ${{ steps.set-browser-test-targets.outputs.browser_test_targets_json }}
      test_dimensions: ${{ steps.set-test-dimensions.outputs.test_dimensions }}
      test_attempts: ${{ steps.set-test-attempts.outputs.test_attempts }}
      num_gtest_shards: ${{ steps.set-gtest-shards.outputs.num_gtest_shards }}
      enable_sccache: ${{ steps.set-enable-sccache.outputs.enable_sccache }}
      docker_service: ${{ steps.set-docker-service.outputs.docker_service }}

  # Builds, tags, and pushes Cobalt docker build images to ghr.
  docker-build-image:
    needs: [initialize]
    if: needs.initialize.outputs.skip_ci != 'true'
    runs-on: [self-hosted, chrobalt-linux-runner]
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Build docker image
        if: needs.initialize.outputs.docker_service != ''
        id: build-docker-image
        uses: ./.github/actions/docker
        with:
          docker_service: ${{ needs.initialize.outputs.docker_service }}
          is_pr: ${{ (github.event_name == 'pull_request') }}
          docker_content_sha: ${{ needs.initialize.outputs.docker_content_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      docker_tag: ${{ steps.build-docker-image.outputs.docker_tag }}

  # Builds, tags, and pushes Cobalt unit test image to ghr.
  docker-unittest-image:
    if: needs.initialize.outputs.skip_ci != 'true' && needs.initialize.outputs.test_on_host == 'true'
    needs: [initialize]
    runs-on: [self-hosted, chrobalt-linux-runner]
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Build docker image
        id: build-docker-image
        uses: ./.github/actions/docker
        with:
          docker_service: unittest
          is_pr: ${{ (github.event_name == 'pull_request') }}
          docker_content_sha: ${{ needs.initialize.outputs.docker_content_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      docker_tag: ${{ steps.build-docker-image.outputs.docker_tag }}

  # Builds, tags, and pushes Cobalt web test image to ghr.
  docker-webtest-image:
    if: needs.initialize.outputs.skip_ci != 'true' && needs.initialize.outputs.web_tests == 'true'
    needs: [initialize]
    runs-on: [self-hosted, chrobalt-linux-runner]
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Build docker image
        id: build-docker-image
        uses: ./.github/actions/docker
        with:
          docker_service: webtest
          is_pr: ${{ (github.event_name == 'pull_request') }}
          docker_content_sha: ${{ needs.initialize.outputs.docker_content_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      docker_tag: ${{ steps.build-docker-image.outputs.docker_tag }}

  build:
    needs: [initialize, docker-build-image]
    if: needs.initialize.outputs.skip_ci != 'true'
    permissions: {}
    runs-on: ${{ fromJSON(needs.initialize.outputs.build_runners) }}
    name: ${{ matrix.name }}_${{ matrix.config }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: ${{ fromJson(needs.initialize.outputs.build_configs) }}
    container:
      image: ${{ needs.docker-build-image.outputs.docker_tag }}
      options: --device /dev/fuse --cap-add SYS_ADMIN --security-opt apparmor=unconfined
      volumes:
        - /runner-cache:/runner-cache
    env:
      DRY_RUN: ${{ needs.initialize.outputs.dry_run }}
      TEST_ARTIFACTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_artifacts
      DEPOT_TOOLS_UPDATE: 0
      DEPOT_TOOLS_REPORT_BUILD: 0
      DEPOT_TOOLS_COLLECT_METRICS: 0
      DEPOT_TOOLS_METRICS: 0
      IS_CI: 1
    steps:
      - name: Set TMPDIR
        shell: bash
        run: |
          set -x
          if [[ -w /__w/_temp/ ]]; then
            # We want temp folder to be on tmpfs which makes workloads faster.
            # However, dind container ends up having / folder mounted on overlay
            # filesystem, whereas /__w which contains Cobalt source code is on tmpfs.
            echo "TMPDIR=/__w/_temp" >> $GITHUB_ENV
          else
            echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
          fi
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      # TODO(b/501486531): This step duplicates a lot of logic from
      # other steps like depot_tools and checkout. Because I need
      # to verify the performance of overlay in the real world.
      # Before that, keep a weak coupling for easier revert.
      - name: Prepare OverlayFS Workspace
        id: overlay_workspace
        if: ${{ !contains(matrix.platform, 'tvos') }}
        uses: ./.github/actions/overlay_workspace
        with:
          path: cobalt
          use_gcloud: true

      - name: Runner Cache Hot
        if: ${{ !contains(matrix.platform, 'tvos') && steps.overlay_workspace.outputs.cache_hit == 'true' }}
        shell: bash
        run: echo "Golden workspace found on SSD."
      - name: Runner Cache Cold
        if: ${{ !contains(matrix.platform, 'tvos') && steps.overlay_workspace.outputs.cache_hit != 'true' }}
        shell: bash
        run: echo "Golden workspace missing or corrupted. Triggered full initialization sync."

      - name: Checkout
        uses: ./.github/actions/checkout
        with:
          path: cobalt/src
          ref: ${{ github.sha }}
          # Set fetch-depth to 2 to make checkout faster for pull requests and cobalt_sandbox repo.
          # Set fetch-dept to 0 for non pull request workflows in production repo which is needed
          # to properly calculate build id.
          fetch_depth: ${{ ( github.event_name == 'pull_request' || github.repository == 'youtube/cobalt_sandbox' ) && 2 || 0 }}
          use_cache: true

      - name: Set Up Depot Tools
        id: setup-depot-tools
        uses: ./.github/actions/depot_tools
        with:
          use_gcloud: true

      - name: Build Cobalt
        id: build
        uses: ./.github/actions/build
        # TODO(bug?): android debug builds are broken.
        if: ${{ ! (contains(matrix.platform, 'android') && matrix.config == 'debug') }}
        with:
          targets: ${{ needs.initialize.outputs.targets }}
          test_root_target: ${{ needs.initialize.outputs.test_root_target }}
          test_targets_json_file: out/${{ matrix.platform }}_${{ matrix.config }}/test_targets.json
          enable_sccache: ${{ needs.initialize.outputs.enable_sccache == 'true' }}
          sccache_gcs_key: ${{ secrets.sccache_gcs_key }}

      - name: Release Package
        if: steps.build.outputs.skip_autoninja != 'true' && (matrix.config == 'qa' || matrix.config == 'gold') && (needs.initialize.outputs.test_package == 'true' || needs.initialize.outputs.test_e2e == 'true' || needs.initialize.outputs.test_yts == 'true')
        uses: ./.github/actions/package
        with:
          package_dir: out/test-package

      - name: Upload Test Artifacts
        if: steps.build.outputs.skip_autoninja != 'true'
        uses: ./.github/actions/upload_test_artifacts
        with:
          test_artifacts_key: ${{ env.TEST_ARTIFACTS_KEY }}
          upload_on_host_test_artifacts: ${{ matrix.config == 'devel' && (needs.initialize.outputs.test_on_host == 'true' || needs.initialize.outputs.web_tests == 'true') }}
          upload_on_device_test_artifacts: ${{ matrix.config == 'devel' && needs.initialize.outputs.test_on_device == 'true' }}
          upload_e2e_test_artifacts: ${{ matrix.config == 'qa' && (needs.initialize.outputs.test_e2e == 'true' || needs.initialize.outputs.test_yts == 'true') }}
          test_targets_json_file: out/${{ matrix.platform }}_${{ matrix.config }}/test_targets.json
          archive_browsertests: ${{ matrix.config == 'devel' && needs.initialize.outputs.test_browser == 'true' }}
          platform: ${{ matrix.platform }}
          config: ${{ matrix.config }}

      - name: Run API Leak Detector
        uses: ./.github/actions/api_leak_detector
        if: inputs.run_api_leak_detector


  on-device-test:
    needs: [initialize, build]
    if: |
      needs.initialize.outputs.test_on_device == 'true' &&
        (
          (github.event_name == 'pull_request' && github.event.pull_request.draft == false ) ||
          ((inputs.nightly == 'true' || github.event_name == 'schedule') && vars.RUN_ODT_TESTS_ON_NIGHTLY != 'False') ||
          (github.event_name == 'push' && vars.RUN_ODT_TESTS_ON_POSTSUBMIT != 'False')
        )
    runs-on: [self-hosted, odt-runner]
    name: ${{ matrix.name }}_on_device_tests
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
    env:
      TEST_RESULTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_results
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Parse Test Target JSON
        id: test-target-json
        uses: ./.github/actions/test_targets_json
      - name: Run On-Device Tests
        if: ${{ fromJson(steps.test-target-json.outputs.test_targets_count) > 0 }}
        uses: ./.github/actions/on_device_tests
        with:
          nightly: ${{ inputs.nightly }}
          test_targets_json: ${{ steps.test-target-json.outputs.test_targets_json }}
          test_results_key: ${{ env.TEST_RESULTS_KEY }}
          gcs_results_path: gs://cobalt-unittest-storage/results/${{ matrix.name }}/${{ github.run_id }}/${{ github.run_attempt }}
          test_dimensions: '${{ needs.initialize.outputs.test_dimensions }}'
          test_device_family: '${{ needs.initialize.outputs.test_device_family}}'
          test_attempts: '${{ needs.initialize.outputs.test_attempts }}'
    outputs:
      test_targets_json: ${{ steps.test-target-json.outputs.test_targets_json }}

  e2e-test:
    needs: [initialize, build]
    # Run E2E tests for presumit.
    # Also, run E2E tests on push and schedule if not explicitly disabled via repo vars.
    if: |
      needs.initialize.outputs.test_e2e == 'true' &&
        (
          (github.event_name == 'pull_request' && github.event.pull_request.draft == false ) ||
          ((inputs.nightly == 'true' || github.event_name == 'schedule') && vars.RUN_ODT_TESTS_ON_NIGHTLY != 'False') ||
          (github.event_name == 'push' && vars.RUN_ODT_TESTS_ON_POSTSUBMIT != 'False')
        )
    runs-on: [self-hosted, odt-runner]
    name: ${{ matrix.name }}_e2e_tests
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Check Pruning Status
        id: prune-status
        uses: ./.github/actions/check_pruned
      - name: Run E2E Tests
        if: steps.prune-status.outputs.pruned != 'true'
        uses: ./.github/actions/internal_tests
        with:
          test_type: 'e2e_test'
          test_targets: '${{ needs.initialize.outputs.e2e_test_targets }}'
          test_dimensions: '${{ needs.initialize.outputs.test_dimensions }}'
          test_device_family: '${{ needs.initialize.outputs.test_device_family}}'

  yts-test:
