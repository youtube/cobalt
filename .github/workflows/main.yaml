  browser-test-on-host:
    needs: [initialize, build, docker-unittest-image]
    if: |
      needs.initialize.outputs.run_browser_tests == 'true' &&
      needs.initialize.outputs.test_on_host == 'true' &&
      (
        github.event_name == 'pull_request' ||
        ((inputs.nightly == 'true' || github.event_name == 'schedule') && vars.RUN_ODT_TESTS_ON_NIGHTLY != 'False') ||
        (github.event_name == 'push' && vars.RUN_ODT_TESTS_ON_POSTSUBMIT != 'False')
      )
    runs-on: [self-hosted, chrobalt-linux-runner]
    name: ${{ matrix.name }}_browser_tests_on_host
    container:
      image: ${{ needs.docker-unittest-image.outputs.docker_tag }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Check Pruning Status
        id: prune-status
        uses: ./.github/actions/check_pruned
      - name: Run Browser Tests (Linux)
        if: steps.prune-status.outputs.pruned != 'true'
        uses: ./.github/actions/linux_browser_tests
        with:
          test_artifacts_key: ${{ matrix.platform }}_${{ matrix.name }}_test_artifacts
          test_results_key: ${{ matrix.platform }}_${{ matrix.name }}_browsertest_results
          platform: ${{ matrix.platform }}
          config: ${{ matrix.config }}
          gcs_results_path: gs://cobalt-unittest-storage/results/${{ matrix.name }}/${{ github.run_id }}/${{ github.run_attempt }}
    outputs:
      # Browser tests are fixed to a single target.
      test_targets_json: '["cobalt/testing/browser_tests:cobalt_browsertests"]'

  yts-wpt-test:
    needs: [initialize, build]
    if: |
      needs.initialize.outputs.test_yts_wpt == 'true' &&
        (
          (inputs.nightly == 'true' || github.event_name == 'schedule') ||
          (github.event_name == 'push')
        )
    runs-on: [self-hosted, odt-runner]
    name: ${{ matrix.name }}_yts_wpt_tests
    continue-on-error: true # Ignoring errors while we are working to productionize
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Check Pruning Status
        id: prune-status
        uses: ./.github/actions/check_pruned
      - name: Run YTS WPT Tests
        if: steps.prune-status.outputs.pruned != 'true'
        uses: ./.github/actions/internal_tests
        with:
          test_type: 'yts_wpt_test'
          test_targets: '${{ needs.initialize.outputs.yts_wpt_test_targets }}'

  on-host-test:
    needs: [initialize, docker-unittest-image, build]
    if: needs.initialize.outputs.test_on_host == 'true'
    permissions: {}
    runs-on: [self-hosted, chrobalt-linux-runner]
    name: ${{ matrix.name }}_on_host_tests_${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
        shard: ${{ fromJson(needs.initialize.outputs.gtest_shards) }}
    container: ${{ needs.docker-unittest-image.outputs.docker_tag }}
    env:
      TMPDIR: /__w/_temp
      TEST_ARTIFACTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_artifacts
      TEST_RESULTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_results-${{ matrix.shard }}
      DRY_RUN: ${{ needs.initialize.outputs.dry_run }}
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Parse Test Target JSON
        id: test-target-json
        uses: ./.github/actions/test_targets_json
      - name: Run On-Host Tests
        if: ${{ fromJson(steps.test-target-json.outputs.test_targets_count) > 0 }}
        uses: ./.github/actions/on_host_tests
        with:
          nightly: ${{ inputs.nightly }}
          test_artifacts_key: ${{ env.TEST_ARTIFACTS_KEY }}
          test_results_key: ${{ env.TEST_RESULTS_KEY }}
          num_gtest_shards: ${{ needs.initialize.outputs.num_gtest_shards }}
    outputs:
      test_targets_json: ${{ steps.test-target-json.outputs.test_targets_json }}

  web-tests:
    needs: [initialize, docker-webtest-image, build]
    if: needs.initialize.outputs.web_tests == 'true'
    permissions: {}
    runs-on: [self-hosted, chrobalt-linux-runner]
    name: ${{ matrix.name }}_web_tests
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
    container:
      image: ${{ needs.docker-webtest-image.outputs.docker_tag }}
      options: --device /dev/fuse --cap-add SYS_ADMIN --security-opt apparmor=unconfined
      volumes:
        - /runner-cache:/runner-cache
    env:
      DEPOT_TOOLS_UPDATE: 0
      DEPOT_TOOLS_REPORT_BUILD: 0
      DEPOT_TOOLS_COLLECT_METRICS: 0
      DEPOT_TOOLS_METRICS: 0
      TMPDIR: /__w/_temp
      TEST_ARTIFACTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_artifacts
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Check Pruning Status
        id: prune-status
        uses: ./.github/actions/check_pruned
      - name: Prepare OverlayFS Workspace
        if: steps.prune-status.outputs.pruned != 'true'
        id: overlay_workspace
        uses: ./.github/actions/overlay_workspace
        with:
          path: cobalt

      - name: Runner Cache Hot
        if: steps.prune-status.outputs.pruned != 'true' && steps.overlay_workspace.outputs.cache_hit == 'true'
        shell: bash
        run: echo "Golden workspace found on SSD."
      - name: Runner Cache Cold
        if: steps.prune-status.outputs.pruned != 'true' && steps.overlay_workspace.outputs.cache_hit != 'true'
        shell: bash
        run: echo "Golden workspace missing or corrupted. Triggered full initialization sync."

      - name: Checkout
        if: steps.prune-status.outputs.pruned != 'true'
        uses: ./.github/actions/checkout
        with:
          path: cobalt/src
          ref: ${{ github.sha }}
          fetch_depth: ${{ ( github.event_name == 'pull_request' || github.repository == 'youtube/cobalt_sandbox' ) && 2 || 0 }}
          use_cache: true

      - name: Set Up Depot Tools
        if: steps.prune-status.outputs.pruned != 'true'
        id: setup-depot-tools
        uses: ./.github/actions/depot_tools
        with:
          run_sync: 'false'

      - name: Run Web Tests
        if: steps.prune-status.outputs.pruned != 'true'
        uses: ./.github/actions/web_tests
        with:
          test_artifacts_key: ${{ env.TEST_ARTIFACTS_KEY }}
          test_results_key: Blink Web Test Results ${{ github.workflow }}

  test-results:
    needs: [initialize, build, on-device-test, on-host-test, browser-test-on-host]
    if: |
      always() && needs.initialize.outputs.skip_ci != 'true' &&
      (
        needs.on-device-test.result != 'skipped' ||
        needs.on-host-test.result != 'skipped' ||
        needs.browser-test-on-host.result != 'skipped'
      )
    permissions: {}
    runs-on: ubuntu-latest
    name: ${{ matrix.test_target }}
    env:
      TEST_RESULTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_results
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
        test_target: ${{ fromJson(needs.on-device-test.outputs.test_targets_json || needs.on-host-test.outputs.test_targets_json || '[]') }}
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Extract Test Target Name
        id: extract-target-name
        env:
          test_target_with_path: ${{ matrix.test_target }}
        run: echo "test_target=${test_target_with_path#*:}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Check if ${{ matrix.test_target }} is skipped in test filters
        id: filter
        run: |
          set -x
          # Get first entry in test filters file.
          test_filter=""
          test_target="${{ steps.extract-target-name.outputs.test_target }}"
          test_filter_json_dir="${GITHUB_WORKSPACE}/cobalt/testing/filters/${{ matrix.platform }}/${test_target}_filter.json"
          if [ -f ${test_filter_json_dir} ]; then
            test_filter="$(jq -cr '.failing_tests[0]' ${test_filter_json_dir})"
            if [ "${test_filter}" = '*' ]; then
              echo "${test_target} was skipped due to test filter."
              echo "skipped=true" >> $GITHUB_OUTPUT
            else
              echo "skipped=false" >> $GITHUB_OUTPUT
            fi
          fi
        shell: bash
      - name: Download Test Results
        if: steps.filter.outputs.skipped != 'true'
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.TEST_RESULTS_KEY }}*
          path: results/
      - name: Test Results
        if: steps.filter.outputs.skipped != 'true'
        uses: ./.github/actions/process_test_results
        with:
          target_name: ${{ matrix.test_target }}
          results_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*.xml
          log_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*log.txt
          datadog_api_key: ${{ secrets.datadog_api_key }}
          num_gtest_shards: ${{ needs.initialize.outputs.num_gtest_shards }}
      - name: ${{ matrix.test_target }} Device Logs
        if: always() && steps.filter.outputs.skipped != 'true' && needs.initialize.outputs.test_on_device == 'true'
        continue-on-error: true
        uses: ./.github/actions/print_logs
        with:
          log_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*logcat.txt
          # TODO: Enable symbolization when it works.
          # symbolize: true
          symbolize: 'false'
      - name: ${{ matrix.test_target }} Test Logs
        if: always() && steps.filter.outputs.skipped != 'true'
        uses: ./.github/actions/print_logs
        with:
          log_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*log.txt
          results_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*.xml
          # TODO: Enable symbolization when it works.
          # symbolize: ${{ needs.initialize.outputs.test_on_device == 'true' }}
          symbolize: 'false'

  browser-test-results:
    needs: [initialize, build, browser-test-on-host]
    if: always() && needs.initialize.outputs.skip_ci != 'true' && needs.initialize.outputs.run_browser_tests == 'true' && (needs.browser-test-on-host.result != 'skipped' && needs.browser-test-on-host.result != '')
    permissions: {}
    runs-on: ubuntu-latest
    name: ${{ matrix.test_target }}
    env:
      TEST_RESULTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_browsertest_results
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
        test_target: ${{ fromJson(needs.initialize.outputs.browser_test_targets_json || '[]') }}
    steps:
      - name: Restore CI Essentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Extract Test Target Name
        id: extract-target-name
        env:
          test_target_with_path: ${{ matrix.test_target }}
        run: echo "test_target=${test_target_with_path#*:}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Download Test Results
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          pattern: ${{ env.TEST_RESULTS_KEY }}
          path: results/
      - name: Test Results
        uses: ./.github/actions/process_test_results
        with:
          target_name: ${{ matrix.test_target }}
          results_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*.xml
          log_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*log.txt
          datadog_api_key: ${{ secrets.datadog_api_key }}
          num_gtest_shards: 1
      - name: ${{ matrix.test_target }} Device Logs
        if: always() && needs.initialize.outputs.test_on_device == 'true'
        continue-on-error: true
        uses: ./.github/actions/print_logs
        with:
          log_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*logcat.txt
          symbolize: 'false'
      - name: ${{ matrix.test_target }} Test Logs
        if: always()
        uses: ./.github/actions/print_logs
        with:
          log_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*log.txt
          results_glob: results/**/${{ steps.extract-target-name.outputs.test_target }}*.xml
          symbolize: 'false'

  validate-test-result:
    needs: [initialize, build, test-results, browser-test-results]
    if: always() && needs.initialize.result == 'success'
    permissions: {}
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}_tests_passing
    env:
      TEST_RESULTS_KEY: ${{ matrix.platform }}_${{ matrix.name }}_test_results
    strategy:
      matrix:
        platform: ${{ fromJson(needs.initialize.outputs.platforms) }}
        include: ${{ fromJson(needs.initialize.outputs.includes) }}
        config: [devel]
    steps:
      - name: Verify CI Pipeline Status
        run: |
          # Print exact results for debugging
          echo "DEBUG: build result is '${{ needs.build.result }}'"
          echo "DEBUG: test-results result is '${{ needs.test-results.result }}'"
          echo "DEBUG: browser-test-results result is '${{ needs.browser-test-results.result }}'"

          # 1. If upstream CI was safely pruned/skipped at the initialization stage, report success immediately.
          if [[ "${{ needs.initialize.outputs.skip_ci }}" == "true" ]]; then
            echo "CI was safely pruned by initialization checks. Gatekeeper passing!"
            exit 0
          fi

          # 2. Verify that required upstream jobs succeeded or were safely skipped.
          # We explicitly allow 'success', 'skipped', and empty strings (which GHA may emit for un-triggered conditional jobs).
          # Any other state (failure, cancelled, timed_out) is fatal.
          for result in "${{ needs.build.result }}" "${{ needs.test-results.result }}" "${{ needs.browser-test-results.result }}"; do
            trimmed_result=$(echo "$result" | xargs)
            case "$trimmed_result" in
              success|skipped|"")
                echo "Upstream job result '$trimmed_result' is valid."
                ;;
              *)
                echo "::error::A required upstream job failed, timed out, or was cancelled (result: $trimmed_result)!"
                exit 1
                ;;
            esac
          done
        shell: bash
      - name: Restore CI Essentials
        if: needs.initialize.outputs.skip_ci != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: ${{ env.CI_ESSENTIALS }}
      - name: Download Unit Test Results
        if: needs.initialize.outputs.skip_ci != 'true' && needs.test-results.result != 'skipped' && needs.test-results.result != ''
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.TEST_RESULTS_KEY }}*
          path: results/
      - name: Download Browser Test Results
        if: needs.initialize.outputs.skip_ci != 'true' && needs.initialize.outputs.run_browser_tests == 'true' && needs.browser-test-results.result != 'skipped' && needs.browser-test-results.result != ''
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          pattern: ${{ matrix.platform }}_${{ matrix.name }}_browsertest_results
          path: results/
      - name: Failed Tests
        if: always() && needs.initialize.outputs.skip_ci != 'true'
        run: |
          # Print test result summary if any results exist.
          shopt -s globstar nullglob
          files=(results/**/*.xml)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No test result XMLs found. Skipping parser."
            exit 0
          fi
          python3 cobalt/tools/junit_mini_parser.py "${files[@]}"
        shell: bash
