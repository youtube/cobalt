name: android

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - experimental/*
      - feature/*
  push:
    branches:
      - main
      - experimental/*
      - feature/*
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Nightly workflow.'
        required: true
        type: boolean
        default: false
      label_name:
        description: 'Label that triggered this run.'
        required: false
        type: string
        default: ''

permissions: read-all

jobs:
  chromium_android-arm64:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: chromium_android-arm64
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  chromium_android-arm:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: chromium_android-arm
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  chromium_android-x86:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: chromium_android-x86
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  # Cobalt specific build configs
  android-arm64:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: android-arm64
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  android-arm:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: android-arm
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
  android-x86:
    uses: ./.github/workflows/main.yaml
    permissions:
      packages: write
      pull-requests: write
    with:
      platform: android-x86
      nightly: ${{ github.event.inputs.nightly }}
      label_name: ${{ github.event.inputs.label_name }}
    secrets:
      datadog_api_key: ${{ secrets.DD_API_KEY }}
