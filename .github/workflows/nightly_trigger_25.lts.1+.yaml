name: nightly_trigger_25.lts.1+

on:
  schedule:
    # GMT timezone.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions: {}

env:
  GITHUB_REPO: ${{ github.repository }}

jobs:
  trigger_25:
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nightly
        run: |
          set -x
          gh workflow run android_25.lts.1+ --ref 25.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run evergreen_25.lts.1+ --ref 25.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run linux_25.lts.1+ --ref 25.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run raspi-2_25.lts.1+ --ref 25.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run win32_25.lts.1+ --ref 25.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
          gh workflow run xb1_25.lts.1+ --ref 25.lts.1+ -f nightly=true --repo "${GITHUB_REPO}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
