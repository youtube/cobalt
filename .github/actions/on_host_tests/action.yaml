name: On Host Tests
description: Runs on-host tests.
inputs:
  nightly:
    description: "Indicates if this is a nightly job."
    required: true
  test_artifacts_key:
    description: "Artifact key used to store test artifacts."
    required: true
  test_results_key:
    description: "Artifact key used to store test results."
    required: true
  num_gtest_shards:
    description: "Total number of shards used to run the steps in this file."
    required: true
runs:
  using: "composite"
  steps:
    - name: Set Up Depot Tools
      uses: ./.github/actions/depot_tools
      with:
        run_sync: 'false'
    - name: Download Artifacts
      uses: actions/download-artifact@v5
      with:
        name: ${{ inputs.test_artifacts_key }}
    - name: Extract Artifacts
      shell: bash
      run: |
        set -x
        mkdir -p unit_test/
        cd unit_test/
        tar -I 'zstd -T0' -xf ../test_artifacts.tar.zstd
    - name: Setup Environment for Host Tests
      shell: bash
      run: |
        results_dir="${GITHUB_WORKSPACE}/results"
        echo "results_dir=${results_dir}" >> $GITHUB_ENV
        mkdir -p "${results_dir}"

        out_dir="${GITHUB_WORKSPACE}/unit_test/out/${{ matrix.platform }}_${{ matrix.config }}"
        echo "out_dir=${out_dir}" >> $GITHUB_ENV

        LD_LIBRARY_PATH="${out_dir}/starboard:${out_dir}"
        echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" >> $GITHUB_ENV

        echo "ASAN_OPTIONS=exitcode=0" >> $GITHUB_ENV
        echo "XVFB_SERVER_ARGS=-screen 0 1920x1080x24i +render +extension GLX -noreset" >> $GITHUB_ENV

    - name: Run GTests
      id: run-tests
      shell: bash
      env:
        GTEST_SHARD_INDEX: ${{ matrix.shard }}
        GTEST_TOTAL_SHARDS: ${{ inputs.num_gtest_shards }}
      run: |
        set -x
        env

        test_output="${results_dir}/shard_${{ matrix.shard }}"
        mkdir -p ${test_output}

        failed_suites=""
        cd unit_test/

        targets_file="out/${{ matrix.platform }}_${{ matrix.config }}/test_targets.json"
        unit_executables=$(jq -cr '.on_host.unit_executables // [] | join(" ")' "${targets_file}")

        if [[ -n "${unit_executables}" ]]; then
          executables="${unit_executables}"
        else
          executables=$(jq -cr '.on_host.unit // [] | map(. | split(":")[-1]) | join(" ")' "${targets_file}")
        fi

        if [[ -z "${executables}" ]]; then
          echo "No on-host unit tests to run."
        else
          for executable in ${executables}; do
          test_binary="${executable%%.*}"
          test_binary_path="out/${{ matrix.platform }}_${{ matrix.config }}/${executable}"

          echo "Running tests for suite: ${test_binary}"

          test_filter="*"
          test_filter_json_dir="${GITHUB_WORKSPACE}/cobalt/testing/filters/${{ matrix.platform }}/${test_binary}_filter.json"
          if [ -f ${test_filter_json_dir} ]; then
            test_filter=`jq -r '"-" + (.failing_tests | join(":"))' ${test_filter_json_dir}`
          fi

          echo "Test filter evaluated to: ${test_filter}"
          xml_path="${test_output}/${test_binary}_result.xml"
          log_path="${test_output}/${test_binary}_log.txt"

          wrapper_path="$(dirname "${test_binary_path}")/bin/run_${test_binary}"
          if [[ ! -x "${wrapper_path}" ]]; then
            wrapper_path="bin/run_${test_binary}"
          fi

          if [[ -x "${wrapper_path}" ]]; then
            ENTRYPOINT="./${wrapper_path}"
          else
            ENTRYPOINT="./${test_binary_path}"
          fi

          if [ "${test_filter}" == "-*" ]; then
            echo "Skipped due to test filter." >  ${log_path}
          else
            /usr/bin/xvfb-run -a --server-args="${XVFB_SERVER_ARGS}" \
                stdbuf -i0 -o0 -e0 $ENTRYPOINT \
                --single-process-tests \
                --gtest_shard_index="${GTEST_SHARD_INDEX}" \
                --gtest_total_shards="${GTEST_TOTAL_SHARDS}" \
                --gtest_output="xml:${xml_path}" \
                --gtest_filter="${test_filter}" 2>&1 | tee ${log_path} || {
              failed_suites="${failed_suites} ${test_binary}"
            }

            if [[ ! -f ${xml_path} ]]; then
              python3 ${GITHUB_WORKSPACE}/.github/scripts/generate_crash_report.py "${log_path}" "${xml_path}"
            fi
          fi
        done
        fi
        echo "Finished running tests..."
        if [[ -n "${failed_suites}" ]]; then
          echo "Test suites failed:${failed_suites}"
          exit 1
        fi

    - name: Run JUnit Tests
      shell: bash
      run: |
        set -x
        set -o pipefail

        cd unit_test/
        targets_file="out/${{ matrix.platform }}_${{ matrix.config }}/test_targets.json"

        failed_suites=""

        if [[ -f "${targets_file}" ]]; then
          junit_targets=$(jq -cr '.on_host.junit // [] | .[]' "${targets_file}")
          if [[ -z "${junit_targets}" ]]; then
            echo "No on-host JUnit tests to run."
          else
            for target in ${junit_targets}; do
            test_binary="${target#*:}"
            test_binary_path="out/${{ matrix.platform }}_${{ matrix.config }}/${test_binary}"
            log_path="${results_dir}/${test_binary}_log.txt"

            wrapper_path="$(dirname "${test_binary_path}")/bin/run_${test_binary}"
            if [[ ! -x "${wrapper_path}" ]]; then
              wrapper_path="bin/run_${test_binary}"
            fi

            if [[ -x "${wrapper_path}" ]]; then
              echo "Running JUnit tests for suite: ${test_binary}"
              /usr/bin/xvfb-run -a --server-args="${XVFB_SERVER_ARGS}" \
                  stdbuf -i0 -o0 -e0 ./${wrapper_path} --robolectric-runtime-deps-dir third_party/robolectric/cipd/lib 2>&1 | tee ${log_path} || {
                echo "JUnit test suite failed: ${test_binary}"
                failed_suites="${failed_suites} ${test_binary}"
              }
            else
              echo "Wrapper script not found or not executable: ${wrapper_path}"
              failed_suites="${failed_suites} ${test_binary}"
            fi
          done
          fi
        fi

        if [[ -n "${failed_suites}" ]]; then
          echo "JUnit test suites failed:${failed_suites}"
          exit 1
        fi
    - name: Archive Test Results
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test_results_key }}
        path: ${{ env.results_dir }}/*
