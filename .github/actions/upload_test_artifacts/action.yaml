name: Test Artifact Upload
description: Uploads test archives for on-device and on-host tests.
inputs:
  upload_e2e_test_artifacts:
    description: "Indicates if E2E test artifacts should be uploaded."
    required: true
  upload_on_host_test_artifacts:
    description: "Indicates if on-host test artifacts should be uploaded."
    required: true
  upload_on_device_test_artifacts:
    description: "Indicates if on-device test artifacts should be uploaded."
    required: true
  test_artifacts_key:
    description: "Artifact key used to store on-host test artifacts."
    required: true
  test_targets_json_file:
    description: "The path to test targets json file."
    required: true
  platform:
    description: "The platform for which artifacts are being uploaded."
    required: true
  config:
    description: "The build configuration (e.g., devel, qa, gold)."
    required: true
runs:
  using: "composite"
  steps:
    - name: Create Artifacts Directory
      run: mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
      shell: bash

    - name: Compute Archive Flags
      id: compute-flags
      env:
        PLATFORM: ${{ inputs.platform }}
      run: |
        flags="--compression zstd --compression-level=9"
        if [[ "${PLATFORM}" == *android* ]]; then
          flags="--compression gz --archive-per-target --use-android-deps-path --flatten-deps"
        elif [[ "${PLATFORM}" == *raspi* || "${PLATFORM}" == *rdk* ]]; then
          flags="--compression gz --archive-per-target --flatten-deps"
        fi
        echo "flags=${flags}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Copy Runnables to Artifacts
      if: inputs.upload_on_device_test_artifacts == 'true'
      env:
        TEST_TARGETS_JSON_FILE: ${{ inputs.test_targets_json_file }}
      run: |
        set -eux
        cd cobalt/src/
        mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
        mapfile -t targets < <(jq -r '.[] | select(.executable != null and .runs_on == "device") | .executable' "${TEST_TARGETS_JSON_FILE}")
        for target in "${targets[@]}"; do
          cp "${target}" "${GITHUB_WORKSPACE}/artifacts/"
        done
      shell: bash
    - name: Archive Host Tests
      if: inputs.upload_on_host_test_artifacts == 'true'
      env:
        TEST_TARGETS_JSON_FILE: ${{ inputs.test_targets_json_file }}
        PLATFORM: ${{ inputs.platform }}
        CONFIG: ${{ inputs.config }}
        ARCHIVE_FLAGS: ${{ steps.compute-flags.outputs.flags }}
      run: |
        set -x
        mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
        cd cobalt/src/

        TARGETS=$(jq -cr '[.[] | select(.target != null and .runs_on == "host" and .test_type == "gtest") | .target] | join(",")' "${TEST_TARGETS_JSON_FILE}")
        if [[ -z "${TARGETS}" ]]; then
          echo "No host GUnit targets to archive. Skipping."
          exit 0
        fi

        time vpython3 -u ./cobalt/build/archive_test_artifacts.py \
          --source-dir ${GITHUB_WORKSPACE}/cobalt/src \
          --out-dir out/${PLATFORM}_${CONFIG}/ \
          --destination-dir ${GITHUB_WORKSPACE}/artifacts \
          --targets "${TARGETS}" \
          ${ARCHIVE_FLAGS}
      shell: bash

    - name: Archive Device Tests
      if: inputs.upload_on_device_test_artifacts == 'true'
      env:
        TEST_TARGETS_JSON_FILE: ${{ inputs.test_targets_json_file }}
        PLATFORM: ${{ inputs.platform }}
        CONFIG: ${{ inputs.config }}
        ARCHIVE_FLAGS: ${{ steps.compute-flags.outputs.flags }}
      run: |
        set -x
        mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
        cd cobalt/src/

        TARGETS=$(jq -cr '[.[] | select(.target != null and .runs_on == "device" and .test_type == "gtest") | .target] | join(",")' "${TEST_TARGETS_JSON_FILE}")
        if [[ -z "${TARGETS}" ]]; then
          echo "No device GUnit targets to archive. Skipping."
          exit 0
        fi

        time vpython3 -u ./cobalt/build/archive_test_artifacts.py \
          --source-dir ${GITHUB_WORKSPACE}/cobalt/src \
          --out-dir out/${PLATFORM}_${CONFIG}/ \
          --destination-dir ${GITHUB_WORKSPACE}/artifacts \
          --targets "${TARGETS}" \
          ${ARCHIVE_FLAGS}
      shell: bash

    - name: Archive Browser/Web Tests
      if: inputs.upload_on_device_test_artifacts == 'true' || inputs.upload_on_host_test_artifacts == 'true'
      env:
        TEST_TARGETS_JSON_FILE: ${{ inputs.test_targets_json_file }}
        PLATFORM: ${{ inputs.platform }}
        CONFIG: ${{ inputs.config }}
        ARCHIVE_FLAGS: ${{ steps.compute-flags.outputs.flags }}
      run: |
        set -x
        mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
        cd cobalt/src/

        TARGETS=$(jq -cr '[.[] | select(.target != null and (.test_type == "browsertest" or .test_type == "webtest")) | .target] | join(",")' "${TEST_TARGETS_JSON_FILE}")
        if [[ -z "${TARGETS}" ]]; then
          echo "No browser/web targets to archive. Skipping."
          exit 0
        fi

        time vpython3 -u ./cobalt/build/archive_test_artifacts.py \
          --source-dir ${GITHUB_WORKSPACE}/cobalt/src \
          --out-dir out/${PLATFORM}_${CONFIG}/ \
          --destination-dir ${GITHUB_WORKSPACE}/artifacts \
          --targets "${TARGETS}" \
          ${ARCHIVE_FLAGS}
      shell: bash
    - name: Upload On-Host Test Artifacts Archive
      if: inputs.upload_on_host_test_artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test_artifacts_key }}
        path: artifacts/*
        retention-days: 3
    - name: Set up Cloud SDK
      if: inputs.upload_on_device_test_artifacts == 'true' || inputs.upload_e2e_test_artifacts == 'true'
      uses: isarkis/setup-gcloud@40dce7857b354839efac498d3632050f568090b6 # v1.1.1
    - name: Upload On-Device Test Artifacts to GCS
      if: inputs.upload_on_device_test_artifacts == 'true' || inputs.upload_e2e_test_artifacts == 'true'
      env:
        WORKFLOW: ${{ github.workflow }}
        PLATFORM: ${{ inputs.platform }}
        CONFIG: ${{ inputs.config }}
        UPLOAD_E2E_TEST_ARTIFACTS: ${{ inputs.upload_e2e_test_artifacts }}
      run: |
        set -eux
        project_name=$(gcloud config get-value project)

        # Add Cobalt release artifacts for smoke tests.
        if [[ "${UPLOAD_E2E_TEST_ARTIFACTS}" == "true" ]]; then
          mv ${GITHUB_WORKSPACE}/cobalt/src/out/test-package/* \
             ${GITHUB_WORKSPACE}/artifacts/
        fi

        # Upload cobalt.apk for smoke tests.
        if [[ "${PLATFORM}" == *android* ]]; then
          cp "${GITHUB_WORKSPACE}/cobalt/src/out/${PLATFORM}_${CONFIG}/apks/Cobalt.apk" \
             "${GITHUB_WORKSPACE}/artifacts/"
        fi

        gsutil -m cp -r "${GITHUB_WORKSPACE}/artifacts/*" \
          "gs://${project_name}-test-artifacts/${WORKFLOW}/${GITHUB_RUN_NUMBER}/${PLATFORM}/"
      shell: bash
