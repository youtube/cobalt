name: nightly_trigger_main

on:
  schedule:
    # GMT timezone.
    - cron: '0 10,12,14 * * *'
  workflow_dispatch:

jobs:
  trigger_main:
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nightly
        run: |
          set -x
          gh workflow run android_27.lts --ref main -f nightly=true
          gh workflow run evergreen_27.lts --ref main -f nightly=true
          gh workflow run linux_27.lts --ref main -f nightly=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
