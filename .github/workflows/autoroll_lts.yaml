name: Autoroll LTS

on:
  schedule:
    - cron: '0 * * * *' # Hourly.
  workflow_dispatch:
    inputs:
      start_commit:
        description: 'The commit to start rolling from, should point to the last release chore'
        required: true
        default: '7e6524981fdd6ab3c87bc55785343d40116a05e5'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  autoroll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Autoroll
        id: autoroll
        env:
          TARGET_BRANCH: 27.lts
          START_COMMIT: ${{ inputs.start_commit }}
        run: |
          # Ensure we have local branches for both
          git fetch origin main:main || git fetch origin main
          git fetch origin "${TARGET_BRANCH}:${TARGET_BRANCH}" || git fetch origin "${TARGET_BRANCH}"

          git checkout -B "autoroll-to-${TARGET_BRANCH}" "${TARGET_BRANCH}" --no-track

          # Run the Python script to perform cherry-picks and get PR links from stdout
          PR_LINKS=$(python3 .github/scripts/autoroll_lts.py \
            --target-branch "${TARGET_BRANCH}" \
            --start-commit "${START_COMMIT}")

          if [[ -n "$PR_LINKS" ]]; then
            echo "cherry_picked=true" >> "$GITHUB_OUTPUT"
            {
              echo "pr_links<<EOF"
              echo "$PR_LINKS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "cherry_picked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push and Create PR
        if: steps.autoroll.outputs.cherry_picked == 'true'
        env:
          TARGET_BRANCH: 27.lts
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_LINKS: ${{ steps.autoroll.outputs.pr_links }}
        run: |
          git push origin "autoroll-to-${TARGET_BRANCH}" --force

          PR_BODY_FILE=$(mktemp)
          echo "Automated cherry-pick roll to ${TARGET_BRANCH}." > "$PR_BODY_FILE"
          echo "" >> "$PR_BODY_FILE"
          echo "Original pull requests:" >> "$PR_BODY_FILE"
          echo "${PR_LINKS}" >> "$PR_BODY_FILE"

          PR_TITLE="Autoroll from main to ${TARGET_BRANCH}"

          if gh pr view "autoroll-to-${TARGET_BRANCH}" --json number >/dev/null 2>&1; then
            gh pr edit "autoroll-to-${TARGET_BRANCH}" --title "$PR_TITLE" --body-file "$PR_BODY_FILE"
          else
            gh pr create --base "${TARGET_BRANCH}" --head "autoroll-to-${TARGET_BRANCH}" --title "$PR_TITLE" --body-file "$PR_BODY_FILE"
          fi
