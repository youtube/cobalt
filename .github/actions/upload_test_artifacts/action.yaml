name: Test Artifact Upload
description: Uploads test archives for on-device and on-host tests.
inputs:
  upload_e2e_test_artifacts:
    description: "Indicates if E2E test artifacts should be uploaded."
    required: false
    default: "false"
  upload_on_host_test_artifacts:
    description: "Indicates if on-host test artifacts should be uploaded."
    required: false
    default: "false"
  upload_on_device_test_artifacts:
    description: "Indicates if on-device test artifacts should be uploaded."
    required: false
    default: "false"
  test_artifacts_key:
    description: "Artifact key used to store on-host test artifacts."
    required: false
    default: ""
  test_targets_json_file:
    description: "The path to test targets json file (only for legacy mode)."
    required: false
    default: ""
  test_targets_json:
    description: "JSON array of GN targets to package (for dynamic mode)."
    required: false
    default: "[]"
  on_device_executables:
    description: "JSON array of device executables to copy (for dynamic mode)."
    required: false
    default: "[]"
  archive_browsertests:
    description: "Indicates if browser tests should be archived."
    required: false
    default: "false"
  platform:
    description: "The platform for which artifacts are being uploaded."
    required: true
  config:
    description: "The build configuration (e.g., devel, qa, gold)."
    required: true
runs:
  using: "composite"
  steps:
    - name: Create Artifacts Directory
      run: mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
      shell: bash
    - name: Copy Runnables to Artifacts
      if: inputs.upload_on_device_test_artifacts == 'true'
      env:
        TEST_TARGETS_JSON_FILE: ${{ inputs.test_targets_json_file }}
      run: |
        set -eux
        cd cobalt/src/
        mkdir -p "${GITHUB_WORKSPACE}/artifacts/"

        if [[ -n "${{ inputs.on_device_executables }}" && "${{ inputs.on_device_executables }}" != "[]" ]]; then
          readarray -t targets < <(echo '${{ inputs.on_device_executables }}' | jq -r '.[]')
        else
          mapfile -t targets < <(jq -r '.executables | .[]' "${TEST_TARGETS_JSON_FILE}")
        fi

        for target in "${targets[@]}"; do
          cp "${target}" "${GITHUB_WORKSPACE}/artifacts/"
        done
      shell: bash
    - name: Archive Test Dependencies
      if: inputs.upload_on_device_test_artifacts == 'true' || inputs.upload_on_host_test_artifacts == 'true'
      env:
        TEST_TARGETS_JSON_FILE: ${{ inputs.test_targets_json_file }}
        PLATFORM: ${{ inputs.platform }}
        CONFIG: ${{ inputs.config }}
        ARCHIVE_BROWSERTESTS: ${{ inputs.archive_browsertests }}
      run: |
        set -x
        mkdir -p "${GITHUB_WORKSPACE}/artifacts/"
        cd cobalt/src/

        # Determine the correct compression flags:
        # GTests dependencies running on device use gz + flatten-deps for Android/Raspi/RDK.
        # Host-run tests (JUnits or Linux tests) always use zstd and bypass flatten-deps!
        FLAGS=""
        if [[ "${{ inputs.upload_on_device_test_artifacts }}" == "true" ]]; then
          if [[ "${PLATFORM}" == *android* ]]; then
            FLAGS="--compression gz --archive-per-target --use-android-deps-path --flatten-deps"
          elif [[ "${PLATFORM}" == *raspi* || "${PLATFORM}" == *rdk* ]]; then
            FLAGS="--compression gz --archive-per-target --flatten-deps"
          else
            FLAGS="--compression zstd --compression-level=9"
          fi
        else
          FLAGS="--compression zstd --compression-level=9"
          if [[ "${PLATFORM}" == *android* ]]; then
            FLAGS="${FLAGS} --use-android-deps-path"
          fi
        fi

        # Resolve targets in dual-mode
        TARGETS=""
        if [[ -n "${{ inputs.test_targets_json }}" && "${{ inputs.test_targets_json }}" != "[]" ]]; then
          TARGETS=$(echo '${{ inputs.test_targets_json }}' | jq -cr 'join(",") // empty')
        else
          if [[ -f "${TEST_TARGETS_JSON_FILE}" ]]; then
            TARGETS=$(jq -cr '.test_targets | join(",")' "${TEST_TARGETS_JSON_FILE}")
          fi
        fi

        if [[ -z "${TARGETS}" || "${TARGETS}" == "null" ]]; then
          echo "No targets to archive dependencies for. Bypassing step successfully."
          exit 0
        fi

        # Archive browser tests if requested (only for legacy compatibility mode)
        if [[ "${ARCHIVE_BROWSERTESTS}" == "true" ]]; then
          BROWSERTEST_TARGET="cobalt/testing/browser_tests:cobalt_browsertests"
          if [[ -n "${TARGETS}" ]]; then
            TARGETS="${TARGETS},${BROWSERTEST_TARGET}"
          else
            TARGETS="${BROWSERTEST_TARGET}"
          fi
        fi

        if [[ -n "${TARGETS}" ]]; then
          time vpython3 -u ./cobalt/build/archive_test_artifacts.py \
            --source-dir ${GITHUB_WORKSPACE}/cobalt/src \
            --out-dir out/${PLATFORM}_${CONFIG}/ \
            --destination-dir ${GITHUB_WORKSPACE}/artifacts \
            --targets "${TARGETS}" \
            ${FLAGS}
        fi
      shell: bash
    - name: Upload On-Host Test Artifacts Archive
      if: inputs.upload_on_host_test_artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test_artifacts_key }}
        path: artifacts/*
        retention-days: 3
    - name: Set up Cloud SDK
      if: inputs.upload_on_device_test_artifacts == 'true' || inputs.upload_e2e_test_artifacts == 'true'
      uses: isarkis/setup-gcloud@40dce7857b354839efac498d3632050f568090b6 # v1.1.1
    - name: Upload On-Device Test Artifacts to GCS
      if: inputs.upload_on_device_test_artifacts == 'true' || inputs.upload_e2e_test_artifacts == 'true'
      env:
        WORKFLOW: ${{ github.workflow }}
        PLATFORM: ${{ inputs.platform }}
        CONFIG: ${{ inputs.config }}
        UPLOAD_E2E_TEST_ARTIFACTS: ${{ inputs.upload_e2e_test_artifacts }}
      run: |
        set -eux
        project_name=$(gcloud config get-value project)

        # Add Cobalt release artifacts for smoke tests.
        if [[ "${UPLOAD_E2E_TEST_ARTIFACTS}" == "true" ]]; then
          mv ${GITHUB_WORKSPACE}/cobalt/src/out/test-package/* \
             ${GITHUB_WORKSPACE}/artifacts/
        fi

        # Upload cobalt.apk for smoke tests.
        if [[ "${PLATFORM}" == *android* ]]; then
          cp "${GITHUB_WORKSPACE}/cobalt/src/out/${PLATFORM}_${CONFIG}/apks/Cobalt.apk" \
             "${GITHUB_WORKSPACE}/artifacts/"
        fi

        gsutil -m cp -r "${GITHUB_WORKSPACE}/artifacts/*" \
          "gs://${project_name}-test-artifacts/${WORKFLOW}/${GITHUB_RUN_NUMBER}/${PLATFORM}/"
      shell: bash
